<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>룸메이커 관리자 — 게임 편집 · 토큰 발급</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d16;--panel:#151522;--panel2:#1d1d30;--line:#2a2a45;--tx:#e8e8f2;--dim:#8a8aa8;--ac:#7c5cff;--ok:#3ecf8e;--warn:#ffb04b;--err:#ff5c7a}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;font-size:14px}
a{color:var(--ac)}
#top{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
#top h1{font-size:16px}
#top .sp{flex:1}
#layout{display:flex;min-height:calc(100vh - 53px)}
#side{width:260px;border-right:1px solid var(--line);padding:14px;flex-shrink:0}
#main{flex:1;padding:18px;max-width:900px}
.gcard{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--panel)}
.gcard:hover{border-color:var(--ac)}
.gcard.sel{border-color:var(--ac);background:var(--panel2)}
.gcard .em{font-size:22px}
.gcard .t{font-weight:600;font-size:13px}
.gcard .s{color:var(--dim);font-size:11px}
.chip{display:inline-block;padding:1px 8px;border-radius:99px;font-size:10px;border:1px solid var(--line);color:var(--dim)}
.chip.blocks{color:var(--ok);border-color:var(--ok)}
.chip.html{color:var(--warn);border-color:var(--warn)}
.chip.pub{color:var(--ok);border-color:var(--ok)}
.chip.draft{color:var(--dim)}
h2{font-size:15px;margin:16px 0 10px}
.meta{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
.meta .row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.meta label{font-size:11px;color:var(--dim);display:block;margin-bottom:3px}
.meta input,.meta select{background:var(--panel2);border:1px solid var(--line);color:var(--tx);padding:7px 10px;border-radius:6px}
.chap{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.chap>.hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel2);cursor:pointer}
.chap>.hd .lbl{font-size:11px;color:var(--ac);font-weight:700}
.chap>.hd .ttl{font-weight:600}
.chap>.hd .cnt{color:var(--dim);font-size:11px;margin-left:auto}
.blk{border-top:1px solid var(--line);padding:10px 14px;background:var(--panel)}
.blk .bh{display:flex;align-items:center;gap:8px}
.blk .ty{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.ty.puzzle{background:#2b2050;color:#b9a5ff}.ty.story{background:#1c3145;color:#7fc6ff}.ty.chapter{background:#173428;color:#6fe0a8}.ty.letter{background:#402a18;color:#ffb87a}
.blk .sum{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blk .sum .no{color:var(--ac);font-weight:700}
button{background:var(--panel2);border:1px solid var(--line);color:var(--tx);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
button:hover{border-color:var(--ac)}
button.pri{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
button.danger:hover{border-color:var(--err);color:var(--err)}
button.mini{padding:2px 7px;font-size:11px}
.editor{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;display:grid;gap:8px}
.editor .f label{font-size:11px;color:var(--dim);display:block;margin-bottom:3px}
.editor input,.editor textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--tx);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:13px}
.editor textarea{min-height:60px;resize:vertical}
.editor textarea.json{font-family:Consolas,monospace;font-size:12px;min-height:90px}
.hintTx{color:var(--dim);font-size:10px;margin-top:2px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--ac);padding:10px 20px;border-radius:10px;display:none;z-index:99}
#toast.err{border-color:var(--err)}
.empty{color:var(--dim);padding:30px;text-align:center}
.tab{padding:6px 12px}
.tab.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
#tokenView{padding:18px;max-width:1000px}
.card2{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.card2 h2{margin-top:0}
.frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.frow .f{display:flex;flex-direction:column;gap:3px}
.frow label{font-size:11px;color:var(--dim)}
.frow input,.frow select{background:var(--panel2);border:1px solid var(--line);color:var(--tx);padding:7px 10px;border-radius:6px;font-size:13px}
.issued{margin-top:14px;display:grid;gap:8px}
.tk{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--ok);border-radius:10px;padding:10px 12px}
.tk .code{font-family:Consolas,monospace;font-size:18px;font-weight:700;letter-spacing:1px;color:var(--ok)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
th{color:var(--dim);font-weight:600;font-size:11px}
td.code{font-family:Consolas,monospace;font-weight:700}
.st{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.st.unused{background:#173428;color:#6fe0a8}
.st.used{background:#1c2540;color:#8fa8ff}
.st.revoked{background:#3a1620;color:#ff8fa3}
</style>
</head>
<body>
<div id="top">
  <h1>🧩 룸메이커 관리자</h1>
  <button class="tab on" id="tabDash" onclick="showView('dash')">📊 대시보드</button>
  <button class="tab" id="tabEdit" onclick="showView('edit')">게임 편집</button>
  <button class="tab" id="tabToken" onclick="showView('token')">🎟 토큰 발급</button>
  <a href="/admin/docs"><button class="tab">📄 제작 MD</button></a>
  <span class="sp"></span>
  <a href="/" style="font-size:12px;color:var(--dim);text-decoration:none">게임 목록 ↗</a>
  <a href="/admin/logout"><button>로그아웃</button></a>
</div>
<div id="dashView" style="padding:18px;max-width:1000px">
  <div class="bar2" id="dashSum" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"></div>
  <div class="card2">
    <h2>게임 <span style="font-weight:400;color:var(--dim);font-size:12px">— 비공개로 내리면 구매자 목록·상세·플레이에서 완전히 사라집니다</span></h2>
    <div id="dashList"><div class="empty">불러오는 중…</div></div>
  </div>
</div>
<div id="layout" style="display:none">
  <div id="side"><div class="empty">불러오는 중…</div></div>
  <div id="main"><div class="empty">왼쪽에서 게임을 선택하세요</div></div>
</div>

<div id="tokenView" style="display:none">
  <div class="card2">
    <h2>게임 바로 열기 <span style="font-weight:400;color:var(--dim);font-size:12px">— 관리자는 입장 코드 없이 열립니다 (검수용)</span></h2>
    <div id="quickPlay" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <div class="card2">
    <h2>토큰 발급</h2>
    <div class="frow">
      <div class="f" style="flex:2;min-width:220px">
        <label>게임</label>
        <select id="tkGame"></select>
      </div>
      <div class="f" style="flex:1;min-width:140px">
        <label>주문번호</label>
        <input id="tkOrder" placeholder="스마트스토어 주문번호">
      </div>
      <div class="f" style="flex:1;min-width:140px">
        <label>메모 (선택)</label>
        <input id="tkNote" placeholder="구매자명 등">
      </div>
      <div class="f">
        <label>개수</label>
        <input id="tkCount" type="number" value="1" min="1" max="50" style="width:70px">
      </div>
      <button class="pri" id="tkIssue" style="padding:8px 16px">발급하기</button>
    </div>
    <div class="issued" id="tkIssued"></div>
  </div>

  <div class="card2">
    <h2>발급된 토큰</h2>
    <div class="frow" style="margin-bottom:12px">
      <div class="f"><label>게임</label><select id="fGame"><option value="">전체</option></select></div>
      <div class="f"><label>상태</label><select id="fStatus">
        <option value="">전체</option><option value="unused">미사용</option>
        <option value="used">사용됨</option><option value="revoked">무효화</option></select></div>
      <div class="f"><label>검색</label><input id="fQ" placeholder="코드/주문번호/메모"></div>
      <button id="fRefresh">조회</button>
    </div>
    <div id="tkList"><div class="empty">조회 버튼을 눌러주세요</div></div>
  </div>
</div>
<div id="toast"></div>
<script>
const API='/api';
const $=s=>document.querySelector(s);
let GAMES=[],CUR=null;

function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className=err?'err':'';t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
async function api(path,opt={}){
  opt.headers=Object.assign({'content-type':'application/json'},opt.headers||{});
  opt.credentials='same-origin'; // 관리자 세션 쿠키
  if(opt.body&&typeof opt.body!=='string')opt.body=JSON.stringify(opt.body);
  const r=await fetch(API+path,opt);
  if(r.status===401){location.href='/admin/login';return;}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||('HTTP '+r.status));
  return j;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function strip(s){return String(s??'').replace(/<[^>]*>/g,'');}

async function loadGames(){
  try{
    GAMES=await api('/games',{method:'GET'});
    $('#side').innerHTML=GAMES.map(g=>`
      <div class="gcard ${CUR&&CUR.game.id===g.id?'sel':''}" onclick="openGame('${g.id}')">
        <span class="em">${g.emoji||'🎮'}</span>
        <div style="flex:1">
          <div class="t">${esc(g.title)}</div>
          <div class="s">${esc(g.subtitle||g.genre||'')}</div>
          <div style="margin-top:3px;display:flex;gap:4px">
            <span class="chip ${g.engine}">${g.engine}</span>
            <span class="chip ${g.status==='published'?'pub':'draft'}">${g.status==='published'?'공개':'초안'}</span>
            ${g.puzzle_count?`<span class="chip">퍼즐 ${g.puzzle_count}</span>`:''}
          </div>
        </div>
      </div>`).join('')||'<div class="empty">게임 없음</div>';
  }catch(e){$('#side').innerHTML='<div class="empty">목록 로드 실패<br>'+esc(e.message)+'</div>';}
}

async function openGame(id){
  $('#main').innerHTML='<div class="empty">불러오는 중…</div>';
  try{CUR=await api('/games/'+encodeURIComponent(id),{method:'GET'});}catch(e){$('#main').innerHTML='<div class="empty">'+esc(e.message)+'</div>';return;}
  renderGame();loadGames();
}

function renderGame(){
  const {game,chapters,blocks}=CUR;
  if(game.engine==='html'&&!blocks.length){
    $('#main').innerHTML=metaHtml(game)+'<div class="empty">이 게임은 HTML 통짜 형식이라 블록 편집이 불가능해요.<br>블록 형식으로 변환하면 편집할 수 있어요.</div>';
    bindMeta();return;
  }
  const byCh={};blocks.forEach(b=>{(byCh[b.chapter_id]=byCh[b.chapter_id]||[]).push(b);});
  $('#main').innerHTML=metaHtml(game)+chapters.map(c=>{
    const bs=byCh[c.id]||[];
    return `<div class="chap" data-ch="${c.id}">
      <div class="hd" onclick="this.parentElement.classList.toggle('open');const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'':'none'">
        <span class="lbl">${esc(c.label)}</span><span class="ttl">${esc(c.title)}</span>
        <span class="cnt">블록 ${bs.length}개 ▾</span>
      </div>
      <div class="bwrap" style="display:none">
        ${bs.map(b=>blkHtml(b)).join('')}
        <div style="padding:10px 14px;border-top:1px solid var(--line)">
          <button class="mini" onclick="addBlock('${c.id}')">＋ 블록 추가</button>
        </div>
      </div>
    </div>`;
  }).join('');
  bindMeta();
}

function metaHtml(g){
  return `<div class="meta">
    <div class="row">
      <div style="flex:2"><label>제목</label><input id="m_title" value="${esc(g.title)}" style="width:100%"></div>
      <div style="flex:2"><label>부제</label><input id="m_subtitle" value="${esc(g.subtitle||'')}" style="width:100%"></div>
      <div><label>이모지</label><input id="m_emoji" value="${esc(g.emoji||'')}" style="width:60px"></div>
    </div>
    <div class="row">
      <div><label>장르</label><input id="m_genre" value="${esc(g.genre||'')}"></div>
      <div><label>강조색</label><input id="m_accent" value="${esc(g.accent_color||'')}" style="width:90px"></div>
      <div><label>배경색</label><input id="m_bg" value="${esc(g.bg_color||'')}" style="width:90px"></div>
      <div><label>상태</label><select id="m_status"><option value="draft" ${g.status==='draft'?'selected':''}>초안</option><option value="published" ${g.status==='published'?'selected':''}>공개</option></select></div>
      <div style="align-self:flex-end;margin-left:auto;display:flex;gap:8px">
        <a href="/admin/docs?game=${esc(g.id)}" title="이 게임의 스토리·문제·이미지 기획 MD를 열람·수정·다운로드"><button type="button">📄 제작 MD 보기·편집</button></a>
        <button class="pri" id="saveMeta">게임 정보 저장</button>
      </div>
    </div>
    <div class="hintTx">버전 v${g.version} · 마지막 수정 ${g.updated_at||''} (UTC)</div>
  </div>`;
}
function bindMeta(){
  const btn=$('#saveMeta');if(!btn)return;
  btn.onclick=async()=>{
    try{
      await api('/games/'+CUR.game.id,{method:'PUT',body:{
        title:$('#m_title').value,subtitle:$('#m_subtitle').value,emoji:$('#m_emoji').value,
        genre:$('#m_genre').value,accent_color:$('#m_accent').value,bg_color:$('#m_bg').value,status:$('#m_status').value}});
      toast('게임 정보 저장됨 ✓');openGame(CUR.game.id);
    }catch(e){toast(e.message,1)}
  };
}

function blkSummary(b){
  const d=b.data||{};
  if(b.type==='puzzle')return `<span class="no">P${d.no??'?'}</span> ${esc(d.ttl||'')} <span style="color:var(--dim)">· ${esc(d.kind||'')}${d.ans?' · 정답: '+esc(Array.isArray(d.ans)?d.ans.join(', '):d.ans):''}</span>`;
  if(b.type==='chapter')return esc(strip(d.desc||'챕터 표지'));
  if(b.type==='story')return esc(strip((d.text&&d.text[0])||'스토리'));
  if(b.type==='letter')return `단서 글자: ${esc(d.letter||'')}`;
  return esc(JSON.stringify(d).slice(0,80));
}
function blkHtml(b){
  return `<div class="blk" data-id="${b.id}">
    <div class="bh">
      <span class="ty ${b.type}">${b.type}</span>
      <span class="sum">${blkSummary(b)}</span>
      <button class="mini" onclick="moveBlk('${b.id}',-1)" title="위로">▲</button>
      <button class="mini" onclick="moveBlk('${b.id}',1)" title="아래로">▼</button>
      <button class="mini" onclick="toggleEdit('${b.id}')">편집</button>
      <button class="mini danger" onclick="delBlk('${b.id}')">삭제</button>
    </div>
    <div class="editor" id="ed-${b.id}" style="display:none"></div>
  </div>`;
}

function toggleEdit(id){
  const ed=document.getElementById('ed-'+id);
  if(ed.style.display!=='none'){ed.style.display='none';return;}
  const b=CUR.blocks.find(x=>x.id===id);
  const d=b.data||{};
  let html='';
  for(const[k,v]of Object.entries(d)){
    if(k==='type')continue;
    const fid=`f-${id}-${k}`;
    if(typeof v==='string'){
      const long=v.length>50||v.includes('<br>');
      html+=`<div class="f"><label>${k}</label>${long?`<textarea id="${fid}" data-k="${k}" data-kind="str">${esc(v)}</textarea>`:`<input id="${fid}" data-k="${k}" data-kind="str" value="${esc(v)}">`}</div>`;
    }else if(typeof v==='number'){
      html+=`<div class="f"><label>${k}</label><input id="${fid}" data-k="${k}" data-kind="num" type="number" value="${v}"></div>`;
    }else if(Array.isArray(v)&&v.every(x=>typeof x==='string')){
      html+=`<div class="f"><label>${k} <span class="hintTx">(한 줄 = 한 항목)</span></label><textarea id="${fid}" data-k="${k}" data-kind="lines">${esc(v.join('\n'))}</textarea></div>`;
    }else{
      html+=`<div class="f"><label>${k} <span class="hintTx">(JSON)</span></label><textarea id="${fid}" data-k="${k}" data-kind="json" class="json">${esc(JSON.stringify(v,null,1))}</textarea></div>`;
    }
  }
  html+=`<div style="display:flex;gap:8px"><button class="pri" onclick="saveBlk('${id}')">저장</button><button onclick="toggleEdit('${id}')">닫기</button></div>`;
  ed.innerHTML=html;ed.style.display='grid';
}
async function saveBlk(id){
  const b=CUR.blocks.find(x=>x.id===id);
  const d={type:b.type};
  let bad=null;
  document.querySelectorAll(`#ed-${CSS.escape(id)} [data-k]`).forEach(el=>{
    const k=el.dataset.k,kind=el.dataset.kind;
    if(kind==='str')d[k]=el.value;
    else if(kind==='num')d[k]=Number(el.value);
    else if(kind==='lines')d[k]=el.value.split('\n').filter(x=>x.trim()!=='');
    else{try{d[k]=JSON.parse(el.value)}catch(e){bad=k}}
  });
  if(bad)return toast(`'${bad}' 필드의 JSON 형식이 잘못됐어요`,1);
  try{
    await api('/blocks/'+id,{method:'PUT',body:{data:d}});
    b.data=d;toast('블록 저장됨 ✓');
    document.querySelector(`.blk[data-id="${CSS.escape(id)}"] .sum`).innerHTML=blkSummary(b);
    toggleEdit(id);
  }catch(e){toast(e.message,1)}
}
async function delBlk(id){
  if(!confirm('이 블록을 삭제할까요?'))return;
  try{await api('/blocks/'+id,{method:'DELETE'});toast('삭제됨');openGame(CUR.game.id);}catch(e){toast(e.message,1)}
}
async function moveBlk(id,dir){
  const b=CUR.blocks.find(x=>x.id===id);
  const all=CUR.blocks.slice().sort((a,c)=>a.order_index-c.order_index);
  const gi=all.findIndex(x=>x.id===id);
  let gj=gi+dir;
  while(gj>=0&&gj<all.length&&all[gj].chapter_id!==b.chapter_id)gj+=dir;
  if(gj<0||gj>=all.length)return;
  [all[gi],all[gj]]=[all[gj],all[gi]];
  try{
    await api('/reorder',{method:'PUT',body:{ids:all.map(x=>x.id)}});
    openGame(CUR.game.id);
  }catch(e){toast(e.message,1)}
}
async function addBlock(chId){
  const type=prompt('블록 종류 입력: story / chapter / puzzle / letter','puzzle');
  if(!type)return;
  const tmpl={
    story:{type:'story',icon:'📖',text:['새 스토리 문단'],btn:'계속'},
    chapter:{type:'chapter',icon:'🚪',desc:'새 챕터 설명'},
    puzzle:{type:'puzzle',no:0,ttl:'새 퍼즐',icon:'❓',pre:['문제 도입 문장'],dsc:'무엇을 해야 하는지',kind:'text',ans:['정답'],hints:['힌트1','힌트2','힌트3'],after:['해결 후 문장']},
    letter:{type:'letter',letter:'글',cap:'단서 설명'}
  }[type]||{type};
  const maxOrder=Math.max(-1,...CUR.blocks.map(b=>b.order_index))+1;
  try{await api('/blocks',{method:'POST',body:{chapter_id:chId,type,data:tmpl,order_index:maxOrder}});toast('블록 추가됨');openGame(CUR.game.id);}catch(e){toast(e.message,1)}
}

// ══════════════════════════════════════════════════════════
// 토큰 (구매자 접속 코드)
// ══════════════════════════════════════════════════════════
// 게임 목록은 D1이 정본이다(하드코딩 없음). loadGames()가 채운다.
let PLATFORM_GAMES=[];

function showView(v){
  $('#dashView').style.display = v==='dash'?'block':'none';
  $('#layout').style.display   = v==='edit'?'flex':'none';
  $('#tokenView').style.display= v==='token'?'block':'none';
  $('#tabDash').className ='tab'+(v==='dash'?' on':'');
  $('#tabEdit').className ='tab'+(v==='edit'?' on':'');
  $('#tabToken').className='tab'+(v==='token'?' on':'');
  if(v==='dash')loadDash();
  if(v==='token'&&!$('#tkGame').options.length)initTokenView();
}

// ══════════════════════════════════════════════════════════
// 대시보드 (게임 공개상태 + 토큰 통계)
// ══════════════════════════════════════════════════════════
let DASH=[];
async function loadDash(){
  try{
    const r=await api('/dashboard',{method:'GET'});
    DASH=r.games||[]; const s=r.summary||{};
    $('#dashSum').innerHTML=[
      ['공개 게임',s.published??0],['비공개',s.hidden??0],
      ['발급 토큰',s.tokens_total??0],['사용됨',s.tokens_used??0]
    ].map(([l,n])=>`<div class="card2" style="flex:1;min-width:120px;margin:0;padding:12px 14px">
        <div style="font-size:22px;font-weight:800">${n}</div>
        <div style="font-size:11px;color:var(--dim)">${l}</div></div>`).join('');
    $('#dashList').innerHTML=`<table>
      <tr><th>게임</th><th>형식</th><th>공개</th><th>발급</th><th>사용</th><th>미사용</th><th>접속중</th><th></th></tr>
      ${DASH.map(g=>`<tr>
        <td><b>${g.emoji||'🎮'} ${esc(g.title)}</b><div style="color:var(--dim);font-size:10px">${g.id} · v${g.version}</div></td>
        <td><span class="chip ${g.engine}">${g.engine}</span></td>
        <td><span class="st ${g.status==='published'?'unused':'revoked'}">${g.status==='published'?'공개':'비공개'}</span></td>
        <td>${g.tokens_total}</td><td>${g.tokens_used}</td><td>${g.tokens_unused}</td>
        <td>${g.active_sessions?`<span class="chip pub">${g.active_sessions}</span>`:'-'}</td>
        <td style="white-space:nowrap">
          <button class="mini" onclick="window.open('/play/${g.id}','_blank')">미리보기</button>
          <button class="mini ${g.status==='published'?'danger':''}" onclick="toggleVis('${g.id}',${g.status!=='published'})">${g.status==='published'?'비공개로':'공개로'}</button>
        </td></tr>`).join('')}
    </table>`;
  }catch(e){$('#dashList').innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
}
async function toggleVis(id,makePublic){
  if(!confirm(makePublic?'이 게임을 공개할까요?':'비공개로 내리면 구매자가 목록·상세·플레이 어디에서도 접근할 수 없습니다.\n진행할까요?'))return;
  try{await api('/games/'+encodeURIComponent(id)+'/visibility',{method:'POST',body:{public:makePublic}});
    toast(makePublic?'공개됨 ✓':'비공개로 내림');loadDash();loadGames();}
  catch(e){toast(e.message,1);}
}

function initTokenView(){
  PLATFORM_GAMES=GAMES.map(g=>[g.id,(g.emoji||'🎮')+' '+g.title]);
  const opts=PLATFORM_GAMES.map(([id,label])=>`<option value="${id}">${esc(label)}</option>`).join('');
  $('#tkGame').innerHTML=opts;
  $('#fGame').innerHTML='<option value="">전체</option>'+opts;
  $('#quickPlay').innerHTML=PLATFORM_GAMES.map(([id,label])=>
    `<button onclick="window.open('/play/${id}','_blank')" title="/play/${id}">${esc(label)}</button>`).join('');
  $('#tkIssue').onclick=issueTokens;
  $('#fRefresh').onclick=loadTokens;
  loadTokens();
}

function gameLabel(id){const g=PLATFORM_GAMES.find(x=>x[0]===id);return g?g[1]:id;}
// 관리자 페이지가 게임 서버와 같은 도메인에 있으므로 주소를 따로 설정할 필요가 없다.
function playUrl(id){return location.origin+'/play/'+id;}
function kakaoText(t){
  return `[룸메이커] ${gameLabel(t.game_id).replace(/^\S+\s/,'')}\n\n입장 링크: ${playUrl(t.game_id)}\n입장 코드: ${t.token}\n\n· 코드는 처음 한 번만 입력하면 됩니다.\n· 입력 후 7일간 같은 기기에서는 코드 없이 바로 이어서 하실 수 있어요.\n· 코드는 1인 1회용이라 다른 분과 공유하면 접속이 막힙니다.`;
}
async function copy(text,msg){
  try{await navigator.clipboard.writeText(text);toast(msg||'복사됨 ✓');}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');ta.remove();toast(msg||'복사됨 ✓');
  }
}

async function issueTokens(){
  const btn=$('#tkIssue');
  const game_id=$('#tkGame').value, order_ref=$('#tkOrder').value.trim(),
        note=$('#tkNote').value.trim(), count=parseInt($('#tkCount').value,10)||1;
  btn.disabled=true;btn.textContent='발급 중…';
  try{
    const r=await api('/tokens',{method:'POST',body:{game_id,order_ref,note,count}});
    $('#tkIssued').innerHTML=r.tokens.map(t=>`
      <div class="tk">
        <span class="code">${esc(t.token)}</span>
        <span style="color:var(--dim);font-size:12px">${esc(gameLabel(t.game_id))}${t.order_ref?' · 주문 '+esc(t.order_ref):''}</span>
        <span style="flex:1"></span>
        <button class="mini" onclick='copy(${JSON.stringify(t.token)})'>코드 복사</button>
        <button class="mini pri" onclick='copy(${JSON.stringify(kakaoText(t))},"카톡 문구 복사됨 ✓")'>카톡 문구 복사</button>
      </div>`).join('');
    toast(`토큰 ${r.tokens.length}개 발급됨 ✓`);
    $('#tkOrder').value='';$('#tkNote').value='';
    loadTokens();
  }catch(e){toast(e.message,1);}
  finally{btn.disabled=false;btn.textContent='발급하기';}
}

async function loadTokens(){
  const q=new URLSearchParams();
  if($('#fGame').value)q.set('game',$('#fGame').value);
  if($('#fStatus').value)q.set('status',$('#fStatus').value);
  if($('#fQ').value.trim())q.set('q',$('#fQ').value.trim());
  $('#tkList').innerHTML='<div class="empty">불러오는 중…</div>';
  try{
    const rows=await api('/tokens?'+q.toString(),{method:'GET'});
    if(!rows.length){$('#tkList').innerHTML='<div class="empty">토큰이 없습니다</div>';return;}
    const label={unused:'미사용',used:'사용됨',revoked:'무효화'};
    $('#tkList').innerHTML=`<table>
      <tr><th>코드</th><th>게임</th><th>상태</th><th>주문번호</th><th>메모</th><th>발급</th><th>사용</th><th>세션</th><th></th></tr>
      ${rows.map(t=>`<tr>
        <td class="code">${esc(t.token)}</td>
        <td>${esc(gameLabel(t.game_id))}</td>
        <td><span class="st ${t.status}">${label[t.status]||t.status}</span></td>
        <td>${esc(t.order_ref||'')}</td>
        <td>${esc(t.note||'')}</td>
        <td style="color:var(--dim)">${esc((t.issued_at||'').slice(0,16))}</td>
        <td style="color:var(--dim)">${esc((t.used_at||'').slice(0,16))}</td>
        <td>${t.active_sessions?`<span class="chip pub">접속 ${t.active_sessions}</span>`:''}</td>
        <td style="white-space:nowrap">
          <button class="mini" onclick='copy(${JSON.stringify(t.token)})'>복사</button>
          ${t.status!=='revoked'?`<button class="mini danger" onclick="revokeToken('${t.id}')">무효화</button>`:''}
          <button class="mini" onclick="reissueToken('${t.id}')" title="이 토큰을 무효화하고 같은 주문으로 새 코드 발급">재발급</button>
        </td></tr>`).join('')}
    </table>`;
  }catch(e){$('#tkList').innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
}

async function revokeToken(id){
  if(!confirm('이 토큰을 무효화할까요?\n연결된 접속(세션)도 즉시 끊깁니다.'))return;
  try{await api('/tokens/'+encodeURIComponent(id)+'/revoke',{method:'POST',body:{}});toast('무효화됨');loadTokens();}
  catch(e){toast(e.message,1);}
}
async function reissueToken(id){
  if(!confirm('기존 토큰을 무효화하고 새 코드를 발급할까요?'))return;
  try{
    const r=await api('/tokens/'+encodeURIComponent(id)+'/reissue',{method:'POST',body:{}});
    const t=r.token;
    $('#tkIssued').innerHTML=`<div class="tk">
      <span class="code">${esc(t.token)}</span>
      <span style="color:var(--dim);font-size:12px">재발급 · ${esc(gameLabel(t.game_id))}${t.order_ref?' · 주문 '+esc(t.order_ref):''}</span>
      <span style="flex:1"></span>
      <button class="mini" onclick='copy(${JSON.stringify(t.token)})'>코드 복사</button>
      <button class="mini pri" onclick='copy(${JSON.stringify(kakaoText(t))},"카톡 문구 복사됨 ✓")'>카톡 문구 복사</button>
    </div>`;
    toast('새 토큰 발급됨 ✓ (위에서 복사)');loadTokens();
  }catch(e){toast(e.message,1);}
}

loadDash();
loadGames();
</script>
</body>
</html>
