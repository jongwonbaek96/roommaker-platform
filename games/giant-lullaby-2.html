<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>거인의 자장가 2부 — 구름 위의 부엌</title>
<style>
:root{
  --bgA:#22364f; --bgB:#3d5a80; --acc:#f2c14e; --acc2:#ffe9b3;
  --ink:#f3ead8; --dim:rgba(243,234,216,.62);
  --panel:rgba(10,12,24,.88); --line:rgba(243,234,216,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bgA);color:var(--ink);overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
.scr{position:fixed;inset:0;display:none;flex-direction:column}
.scr.on{display:flex}
/* ---------- 배경 ---------- */
.stage{position:absolute;inset:0;overflow:hidden}
.stage .sky{position:absolute;inset:0;transition:opacity 1.2s}
.stage svg.scape{position:absolute;left:0;right:0;bottom:0;width:100%;height:62%;pointer-events:none}
.stars{position:absolute;inset:0;pointer-events:none}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7;animation:tw 3s infinite alternate}
@keyframes tw{from{opacity:.15}to{opacity:.85}}
.floaties{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.floaties i{position:absolute;bottom:-12px;border-radius:50%;background:var(--acc2);opacity:.25;animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-110vh);opacity:0}}
.vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 42%,transparent 45%,rgba(0,0,0,.55) 100%)}
/* ---------- HUD ---------- */
#hud{position:absolute;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;gap:8px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:linear-gradient(rgba(0,0,0,.45),transparent)}
#hud .ttl{font-size:11px;letter-spacing:.12em;color:var(--dim)}
#hud .sub{font-size:12.5px;font-weight:700;color:var(--acc2)}
#hud .sp{flex:1}
.hbtn{min-width:34px;height:34px;border-radius:17px;border:1px solid var(--line);background:rgba(0,0,0,.35);
  font-size:14px;color:var(--acc2);display:flex;align-items:center;justify-content:center;padding:0 9px}
#hintBadge{font-size:11px;color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:4px 10px;background:rgba(0,0,0,.35)}
/* ---------- 타이틀 ---------- */
#scrTitle{align-items:center;justify-content:center;text-align:center;z-index:5}
#scrTitle .inner{position:relative;z-index:2;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;max-width:420px}
.series{font-size:13px;letter-spacing:.5em;color:var(--dim);text-indent:.5em}
.h1{font-size:34px;font-weight:800;letter-spacing:.06em;color:var(--acc2);text-shadow:0 0 24px rgba(0,0,0,.6);line-height:1.25;white-space:pre-line}
.epi{font-size:15px;color:var(--acc);letter-spacing:.14em;margin-top:2px}
.meta{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.8}
.tbtns{display:flex;flex-direction:column;gap:10px;margin-top:26px;width:230px}
.big{padding:14px 0;border-radius:14px;font-size:16px;font-weight:700;letter-spacing:.12em;
  border:1px solid var(--acc);color:var(--acc2);background:rgba(0,0,0,.35);transition:transform .12s}
.big:active{transform:scale(.96)}
.big.ghost{border-color:var(--line);color:var(--dim);font-weight:400;font-size:14px}
/* ---------- 스토리 ---------- */
#scrStory{z-index:6}
#storyTap{position:absolute;inset:0;z-index:3}
.dlg{position:absolute;left:12px;right:12px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:4;
  background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px 20px;
  backdrop-filter:blur(6px);box-shadow:0 8px 30px rgba(0,0,0,.45)}
.dlg .who{display:inline-block;font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.14em;
  border:1px solid var(--acc);border-radius:20px;padding:3px 12px;margin-bottom:10px;background:rgba(0,0,0,.3)}
.dlg .tx{font-size:15.5px;line-height:1.85;min-height:58px;white-space:pre-line}
.dlg .cue{position:absolute;right:16px;bottom:10px;font-size:11px;color:var(--dim);animation:bob 1.2s infinite}
@keyframes bob{50%{transform:translateY(3px)}}
/* ---------- 게임 씬(허브) ---------- */
#scrGame{z-index:6}
#objBar{position:absolute;top:calc(56px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:38;
  font-size:12.5px;color:var(--ink);background:rgba(0,0,0,.5);border:1px solid var(--line);
  border-radius:20px;padding:7px 16px;max-width:88%;text-align:center}
.hs{position:absolute;z-index:30;display:flex;flex-direction:column;align-items:center;gap:4px;transform:translate(-50%,-50%)}
.hs .dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:rgba(0,0,0,.38);border:1.5px solid var(--acc);color:var(--acc2);animation:pulse 2s infinite}
.hs.done .dot{border-color:var(--line);color:var(--dim);animation:none;opacity:.55}
.hs .lb{font-size:11px;color:var(--ink);background:rgba(0,0,0,.55);border-radius:10px;padding:2px 8px;white-space:nowrap}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,165,75,.45)}70%{box-shadow:0 0 0 14px rgba(232,165,75,0)}100%{box-shadow:0 0 0 0 rgba(232,165,75,0)}}
#roomNav{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));z-index:37;
  display:none;gap:8px;background:rgba(0,0,0,.5);border:1px solid var(--line);border-radius:26px;padding:6px}
#roomNav button{padding:9px 16px;border-radius:20px;font-size:13px;color:var(--dim);border:1px solid transparent}
#roomNav button.cur{color:var(--acc2);border-color:var(--acc);background:rgba(232,165,75,.12);font-weight:700}
#nextFab{position:absolute;left:50%;bottom:calc(74px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:39;
  display:none;padding:13px 34px;border-radius:26px;border:1px solid var(--acc);
  background:rgba(0,0,0,.6);color:var(--acc2);font-size:15px;font-weight:700;letter-spacing:.1em;animation:bob 1.4s infinite}
#nextFab.on{display:block}
/* ---------- 토스트 ---------- */
#toast{position:fixed;left:50%;top:24%;transform:translate(-50%,0);z-index:80;display:none;
  background:var(--panel);border:1px solid var(--acc);border-radius:14px;padding:12px 22px;
  font-size:14px;line-height:1.7;color:var(--acc2);text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:86%}
#toast.on{display:block;animation:tin .3s ease}
@keyframes tin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
/* ---------- 모달 ---------- */
#mdWrap{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55)}
#mdWrap.on{display:flex}
#md{width:100%;max-width:520px;max-height:88%;overflow-y:auto;background:var(--panel);
  border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;
  padding:20px 20px calc(24px + env(safe-area-inset-bottom));backdrop-filter:blur(8px)}
#md h3{font-size:17px;color:var(--acc2);letter-spacing:.06em;margin-bottom:4px}
#md .tag{font-size:11px;color:var(--dim);letter-spacing:.2em;margin-bottom:12px}
#md .body{font-size:14.5px;line-height:1.8;color:var(--ink)}
#md .paper{background:rgba(243,234,216,.07);border:1px dashed var(--line);border-radius:12px;
  padding:14px 16px;margin:10px 0;font-size:14px;line-height:1.9;white-space:pre-line}
#md input[type=text]{width:100%;margin-top:12px;padding:13px 14px;border-radius:12px;border:1px solid var(--acc);
  background:rgba(0,0,0,.4);color:var(--ink);font-size:16px;text-align:center;letter-spacing:.1em;outline:none}
.mrow{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:13px 0;border-radius:12px;font-size:15px;font-weight:700;letter-spacing:.08em;
  border:1px solid var(--acc);color:var(--acc2);background:rgba(0,0,0,.3)}
.mbtn.sub{border-color:var(--line);color:var(--dim);font-weight:400}
.mbtn:active{transform:scale(.97)}
.mbtn[disabled]{opacity:.35}
.hintrow{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.hbtn2{font-size:12px;padding:8px 12px;border-radius:18px;border:1px solid var(--line);color:var(--dim)}
.hbtn2.hot{border-color:var(--acc);color:var(--acc)}
.hinttx{margin-top:10px;font-size:13px;line-height:1.75;color:var(--acc2);background:rgba(232,165,75,.08);
  border-left:3px solid var(--acc);border-radius:0 10px 10px 0;padding:10px 12px;display:none;white-space:pre-line}
.hinttx.on{display:block}
.mstat{text-align:center;font-size:13px;color:var(--dim);margin-top:10px;min-height:20px;line-height:1.6}
/* 키패드 */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.pad button{padding:14px 0;border-radius:12px;border:1px solid var(--line);font-size:19px;color:var(--ink);background:rgba(0,0,0,.3)}
.pad button:active{background:rgba(232,165,75,.2)}
.padview{margin-top:14px;text-align:center;font-size:30px;letter-spacing:.4em;text-indent:.4em;color:var(--acc2);
  border:1px solid var(--line);border-radius:12px;padding:12px 0;min-height:58px;background:rgba(0,0,0,.35)}
.dualwin{display:flex;gap:10px;justify-content:center;margin-top:8px}
.dualwin .dw{flex:1;text-align:center}
.dualwin .dw .sym{font-size:20px;color:var(--acc)}
.dualwin .dw .win{border:1px solid var(--line);border-radius:10px;padding:8px 0;font-size:26px;letter-spacing:.3em;text-indent:.3em;color:var(--acc2);background:rgba(0,0,0,.35);min-height:46px}
/* 기억(컵) */
.cups{display:flex;gap:10px;justify-content:center;margin:18px 0 6px;flex-wrap:wrap}
.cup{width:64px;height:76px;border-radius:12px 12px 20px 20px;border:2px solid var(--acc);
  background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.5));display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:8px;font-size:12px;color:var(--dim);transition:all .12s}
.cup.lit{background:var(--acc);color:#221503;box-shadow:0 0 22px var(--acc)}
/* 타이밍 */
.tmwrap{margin-top:16px}
.tmbar{position:relative;height:46px;border-radius:23px;border:1px solid var(--line);overflow:hidden;background:#5a6b85}
.tmzone{position:absolute;top:0;bottom:0;background:#f6f2e7;transition:left .3s,width .3s}
.tmneedle{position:absolute;top:0;bottom:0;width:5px;background:var(--acc);border-radius:3px;box-shadow:0 0 12px var(--acc);z-index:2}
.tmdots{display:flex;gap:7px;justify-content:center;margin-top:12px}
.tmdots i{width:12px;height:12px;border-radius:50%;border:1px solid var(--line)}
.tmdots i.ok{background:var(--acc);border-color:var(--acc)}
/* 회전 고리 */
.rings{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.ring{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:9px 14px;background:rgba(0,0,0,.3)}
.ring .cur{flex:1;text-align:center;font-size:21px;font-weight:800;color:var(--acc2);letter-spacing:.2em}
.ring .rb{width:42px;height:42px;border-radius:50%;border:1px solid var(--acc);color:var(--acc2);font-size:18px}
/* 그리드 */
.gridN{display:grid;gap:5px;margin-top:14px}
.gcell{aspect-ratio:1;border-radius:9px;border:1px solid var(--line);background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--dim)}
.gcell.path{background:rgba(232,165,75,.35);border-color:var(--acc)}
.gcell.start{border-color:var(--acc2);box-shadow:0 0 10px rgba(232,165,75,.5)}
.gcell.bad{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
/* 하프 */
.harp{display:flex;gap:12px;justify-content:center;margin-top:16px;align-items:flex-end}
.hstr{width:44px;border-radius:10px;border:1.5px solid var(--acc);background:rgba(0,0,0,.3);
  display:flex;align-items:flex-end;justify-content:center;padding:8px 0;color:var(--dim);font-size:11px}
.hstr.lit{background:var(--acc);color:#221503;box-shadow:0 0 18px var(--acc)}
.h1s{height:126px}.h2s{height:112px}.h3s{height:98px}.h4s{height:84px}.h5s{height:70px}
/* 별자리 잇기 */
.connwrap{position:relative;margin:12px auto 0;width:min(86vw,300px)}
.connwrap svg{width:100%;background:radial-gradient(ellipse at 50% 30%,rgba(60,70,120,.35),rgba(0,0,0,.5));border:1px solid var(--line);border-radius:14px}
.connwrap .cl{stroke:var(--acc2);stroke-width:1.6;opacity:.85}
.connwrap.glow .cl{stroke:#ffd769;stroke-width:2.6;filter:drop-shadow(0 0 4px #ffd769)}
/* 망원경 */
.scopewrap{margin-top:12px}
.scopeview{position:relative;width:min(80vw,280px);aspect-ratio:1;margin:0 auto;border-radius:50%;
  border:6px solid #1a1424;background:radial-gradient(circle,#101830 0%,#060a18 80%);overflow:hidden}
.scopeview svg{width:100%;height:100%;transition:filter .3s}
.dials{display:flex;gap:8px;justify-content:center;margin-top:12px}
.dials button{width:74px;padding:10px 0;border-radius:12px;border:1px solid var(--acc);color:var(--acc2);font-size:13px;background:rgba(0,0,0,.3)}
/* 조합판 */
.frags{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.frag{width:54px;height:64px;border-radius:10px;border:1.5px solid var(--acc);background:rgba(0,0,0,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--acc2)}
.frag b{font-size:21px}
.frag small{font-size:9px;color:var(--acc);letter-spacing:.05em}
.frag.used{opacity:.25}
.aslots{display:flex;gap:8px;justify-content:center;margin-top:14px}
.aslot{width:50px;height:60px;border-radius:10px;border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:var(--acc2);background:rgba(0,0,0,.25)}
.aslot.fill{border-style:solid;border-color:var(--acc)}
/* 조사 뷰 */
.insp{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;font-size:26px}
.insp span{opacity:.95}
.insp span.off{opacity:.3;position:relative}
.insp span.off::after{content:'✕';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:14px;color:#e06a5a}
.inslabel{text-align:center;font-size:15px;color:var(--acc);border:1px solid var(--acc);border-radius:10px;display:table;margin:6px auto;padding:5px 16px;background:rgba(0,0,0,.35)}
/* 카드/선택/엔딩 */
#cardWrap{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(2,3,8,.92);text-align:center;padding:30px}
#cardWrap.on{display:flex}
#cardWrap .in{max-width:420px}
#cardWrap .k{font-size:12px;letter-spacing:.4em;color:var(--dim);text-indent:.4em;margin-bottom:14px}
#cardWrap .t{font-size:24px;font-weight:800;color:var(--acc2);line-height:1.6;white-space:pre-line}
#cardWrap .d{font-size:14px;color:var(--dim);line-height:2;margin-top:16px;white-space:pre-line}
#cardWrap .go{margin-top:30px;padding:12px 36px;border-radius:24px;border:1px solid var(--acc);color:var(--acc2);font-size:14px;letter-spacing:.1em}
body.flashing #cardWrap{animation:flash .5s}
@keyframes flash{from{background:rgba(243,234,216,.9)}to{background:rgba(2,3,8,.92)}}
#scrChoice{z-index:8;align-items:center;justify-content:center;padding:22px}
#scrChoice .in{position:relative;z-index:2;width:100%;max-width:420px;text-align:center}
#scrChoice .q{font-size:17px;line-height:1.8;margin-bottom:22px;white-space:pre-line}
.chc{display:block;width:100%;text-align:left;border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:16px 18px;margin-bottom:12px}
.chc:active{transform:scale(.97)}
.chc b{display:block;font-size:16px;color:var(--acc2);margin-bottom:4px}
.chc span{font-size:12.5px;color:var(--dim);line-height:1.6}
.chc.seen{border-color:var(--acc)}
.chc .badge{float:right;font-size:10px;color:var(--acc);border:1px solid var(--acc);border-radius:10px;padding:1px 8px}
#scrEnd{z-index:9;align-items:center;justify-content:center;text-align:center;padding:22px;overflow-y:auto}
#scrEnd .in{position:relative;z-index:2;max-width:420px;width:100%;padding:30px 0}
#scrEnd .k{font-size:12px;letter-spacing:.4em;color:var(--dim);text-indent:.4em}
#scrEnd .t{font-size:27px;font-weight:800;color:var(--acc2);margin:12px 0 6px;line-height:1.5}
#scrEnd .stars{font-size:24px;color:var(--acc);letter-spacing:.2em;margin:8px 0}
#scrEnd .stat{font-size:13px;color:var(--dim);line-height:2}
#scrEnd .epl{font-size:14px;line-height:2;color:var(--ink);background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:14px;padding:16px;margin:18px 0;white-space:pre-line;text-align:left}
.nextcard{border:1px dashed var(--acc);border-radius:14px;padding:14px;margin:6px 0 18px;background:rgba(232,165,75,.06)}
.nextcard .nk{font-size:11px;color:var(--acc);letter-spacing:.3em;margin-bottom:6px}
.nextcard .nt{font-size:15px;font-weight:700;color:var(--acc2)}
.nextcard .nd{font-size:12.5px;color:var(--dim);margin-top:6px;line-height:1.7}
#scrEnd .btns{display:flex;flex-direction:column;gap:10px;margin-top:8px}
@media (min-width:520px){ .dlg{left:50%;right:auto;transform:translateX(-50%);width:500px} }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="sky" id="sky"></div>
  <div class="stars" id="stars"></div>
  <svg class="scape" id="scape" viewBox="0 0 360 220" preserveAspectRatio="xMidYMax slice"></svg>
  <div class="floaties" id="floaties"></div>
  <div class="vig"></div>
</div>

<div id="hud" style="display:none">
  <div><div class="ttl">거인의 자장가</div><div class="sub" id="hudSub"></div></div>
  <div class="sp"></div>
  <button class="hbtn" id="btnNote">✎ 수첩</button>
  <button class="hbtn" id="btnMute">♪</button>
</div>

<section class="scr on" id="scrTitle">
  <div class="inner">
    <div class="series">거 인 의  자 장 가</div>
    <div class="h1" id="tTitle"></div>
    <div class="epi" id="tEpi"></div>
    <div class="meta" id="tMeta"></div>
    <div class="tbtns">
      <button class="big" id="btnStart">처음부터</button>
      <button class="big ghost" id="btnCont" style="display:none">이어서 하기</button>
    </div>
    <div class="meta" style="margin-top:18px;opacity:.7">이 게임에는 소리로만 풀 수 있는 문제가 있어요 ♪</div>
  </div>
</section>

<section class="scr" id="scrStory">
  <div id="storyTap"></div>
  <div class="dlg"><div class="who" id="dWho"></div><div class="tx" id="dTx"></div><div class="cue">▼ 탭</div></div>
</section>

<section class="scr" id="scrGame">
  <div id="objBar"></div>
  <div id="hsLayer" style="position:absolute;inset:0"></div>
  <button id="nextFab">다음으로 →</button>
  <div id="roomNav"></div>
</section>

<section class="scr" id="scrChoice">
  <div class="in"><div class="q" id="chQ"></div><div id="chList"></div></div>
</section>

<section class="scr" id="scrEnd">
  <div class="in">
    <div class="k" id="endK"></div>
    <div class="t" id="endT"></div>
    <div class="stars" id="endStars"></div>
    <div class="stat" id="endStat"></div>
    <div class="epl" id="endEpl"></div>
    <div class="nextcard" id="nextCard"></div>
    <div class="btns">
      <button class="big" id="btnAgain">처음부터 다시</button>
      <button class="big ghost" id="btnOther" style="display:none">다른 선택 보기</button>
    </div>
  </div>
</section>

<div id="cardWrap"><div class="in">
  <div class="k" id="cardK"></div><div class="t" id="cardT"></div><div class="d" id="cardD"></div>
  <button class="go" id="cardGo">계속</button>
</div></div>

<div id="mdWrap"><div id="md"></div></div>
<div id="toast"></div>

<script>
'use strict';
/* ================= ENGINE v2 ================= */
var $=function(s){return document.querySelector(s)};
var G=null, EP=null, curBG='plain', curHub=null;
function defState(){return {bi:0, room:null, solved:{}, flags:{}, notes:[], frag:{}, hintS:{}, ansS:{}, listen:{}, start:Date.now(), muted:false, ends:[], lastEnd:null};}
function save(){ try{ localStorage.setItem(EP.id, JSON.stringify(G)); }catch(e){} }
function load(){ try{ var s=localStorage.getItem(EP.id); return s?JSON.parse(s):null; }catch(e){ return null; } }
function show(id){ document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')}); $(id).classList.add('on'); }
function toast(msg,ms){ var t=$('#toast'); t.innerHTML=msg; t.classList.remove('on'); void t.offsetWidth; t.classList.add('on');
  clearTimeout(toast._t); toast._t=setTimeout(function(){t.classList.remove('on')}, ms||2400); }
function hintCount(){ var n=0,k; for(k in G.hintS){ if(G.hintS[k]>0) n++; } for(k in G.ansS){ if(G.ansS[k] && !(G.hintS[k]>0)) n++; } return n; }
function updHud(){ $('#btnMute').textContent=G.muted?'✕':'♪'; }
function norm(s){ return (s||'').toString().trim().toLowerCase().replace(/\s+/g,''); }
function note(t){ if(G.notes.indexOf(t)<0){ G.notes.push(t); save(); } }
function addFrag(L,st){ if(G.frag[L]) return; G.frag[L]=st; save(); SFX.get();
  toast('놋쇠 글자 조각 <b>'+L+'</b>을(를) 챙겼다.<br><span style="color:var(--acc)">'+'★'.repeat(st)+'</span> 각인이 새겨져 있다.',2800);
  note('놋쇠 글자 조각 '+L+' ('+'★'.repeat(st)+')'); }
function fragCount(){ return Object.keys(G.frag).length; }

/* ---------- 배경 ---------- */
function setBG(key){
  var sc = SCENES[key] || SCENES.plain;
  $('#sky').style.background = sc.sky;
  $('#scape').innerHTML = sc.svg || '';
  var st=$('#stars'); st.innerHTML='';
  if(sc.stars){ for(var i=0;i<sc.stars;i++){ var s=document.createElement('i');
    s.style.left=(Math.random()*100)+'%'; s.style.top=(Math.random()*55)+'%';
    s.style.animationDelay=(Math.random()*3)+'s'; if(Math.random()<.2){s.style.width='3px';s.style.height='3px';} st.appendChild(s);} }
  var fl=$('#floaties'); fl.innerHTML='';
  if(sc.float){ for(var j=0;j<sc.float;j++){ var f=document.createElement('i');
    var sz=3+Math.random()*5; f.style.width=sz+'px'; f.style.height=sz+'px';
    f.style.left=(Math.random()*100)+'%'; f.style.animationDuration=(9+Math.random()*10)+'s';
    f.style.animationDelay=(Math.random()*9)+'s'; fl.appendChild(f);} }
}

/* ---------- 흐름 ---------- */
function runBeat(){
  var b = EP.flow[G.bi];
  if(!b) return;
  if(b.t==='story') runStory(b);
  else if(b.t==='hub') runHub(b);
  else if(b.t==='slot'){
    curHub=null; curBG=b.bg||curBG; setBG(curBG); show('#scrGame');
    $('#objBar').textContent=b.obj||''; $('#nextFab').classList.remove('on'); $('#roomNav').style.display='none';
    var layer=$('#hsLayer'); layer.innerHTML='';
    var el=document.createElement('button'); el.className='hs';
    el.style.left=(b.hx||50)+'%'; el.style.top=(b.hy||55)+'%';
    el.innerHTML='<span class="dot">'+(b.icon||'●')+'</span><span class="lb">'+(b.hsLabel||'살펴본다')+'</span>';
    el.addEventListener('click',function(){ AudioBoot(); openSlot(b.slot,function(){ next(); }); });
    layer.appendChild(el);
    openSlot(b.slot, function(){ next(); });
  }
  else if(b.t==='card'){ showCard(b.k,b.title,b.d,function(){ next(); }, b.flash); }
  else if(b.t==='choice') runChoice(b);
  else if(b.t==='end') runEnd(b);
}
function next(){ G.bi++; G.room=null; save(); runBeat(); }

/* ---------- 스토리 ---------- */
var stLines=null, stIdx=0, stDone=null;
function runStory(b){
  curHub=null; curBG=b.bg||curBG; setBG(curBG); show('#scrStory');
  stLines=b.lines; stIdx=0; stDone=function(){ next(); };
  renderLine();
}
function renderLine(){
  var L=stLines[stIdx];
  $('#dWho').textContent=L.sp||'';
  $('#dWho').style.display=L.sp?'inline-block':'none';
  $('#dTx').textContent=L.tx;
  if(L.bg){ curBG=L.bg; setBG(L.bg); }
  if(L.sfx && SFX[L.sfx]) SFX[L.sfx]();
  if(L.motif) playMotif(L.motif);
}
$('#storyTap').addEventListener('click',function(){
  AudioBoot(); SFX.tick();
  if(!stLines) return;
  stIdx++;
  if(stIdx>=stLines.length){ var d=stDone; stDone=null; if(d) d(); }
  else renderLine();
});

/* ---------- 허브(방 이동) ---------- */
function runHub(b){
  curHub=b;
  var keys=b.rooms.map(function(r){return r.key});
  if(!G.room || keys.indexOf(G.room)<0) G.room=b.startRoom||b.rooms[0].key;
  drawScene();
}
function drawScene(){
  var b=curHub; if(!b) return;
  var room=null; b.rooms.forEach(function(r){ if(r.key===G.room) room=r; });
  if(!room) room=b.rooms[0];
  var bg=(typeof room.bg==='function')?room.bg():room.bg;
  curBG=bg; setBG(bg); show('#scrGame');
  $('#objBar').textContent=b.obj||'';
  var layer=$('#hsLayer'); layer.innerHTML='';
  room.hotspots.forEach(function(h){
    if(h.showIf && !h.showIf()) return;
    var el=document.createElement('button'); el.className='hs'+((h.doneIf&&h.doneIf())?' done':'');
    el.style.left=h.x+'%'; el.style.top=h.y+'%';
    el.innerHTML='<span class="dot">'+(h.icon||'●')+'</span><span class="lb">'+h.label+'</span>';
    el.addEventListener('click',function(){ AudioBoot(); h.on(); });
    layer.appendChild(el);
  });
  var nav=$('#roomNav'); nav.innerHTML='';
  if(b.rooms.length>1){
    nav.style.display='flex';
    b.rooms.forEach(function(r){
      var bt=document.createElement('button');
      bt.textContent=r.label; if(r.key===G.room) bt.className='cur';
      bt.addEventListener('click',function(){ if(G.room===r.key) return; AudioBoot(); SFX.tr(); G.room=r.key; save(); drawScene();
        if(r.enterMsg && !G.flags['ent_'+r.key]){ G.flags['ent_'+r.key]=1; save(); toast(r.enterMsg,2600); } });
      nav.appendChild(bt);
    });
  } else nav.style.display='none';
  if(b.doneIf()) $('#nextFab').classList.add('on'); else $('#nextFab').classList.remove('on');
}
$('#nextFab').addEventListener('click',function(){ SFX.tr(); next(); });

/* ---------- 카드 ---------- */
function showCard(k,t,d,cb,flash){
  $('#cardK').textContent=k||''; $('#cardT').textContent=t||''; $('#cardD').textContent=d||'';
  $('#cardWrap').classList.add('on');
  if(flash){ document.body.classList.add('flashing'); setTimeout(function(){document.body.classList.remove('flashing')},520); }
  $('#cardGo').onclick=function(){ SFX.tick(); $('#cardWrap').classList.remove('on'); if(cb)cb(); };
}

/* ---------- 조사 뷰(수첩·오브젝트) ---------- */
function openInspect(title,tag,html,onFirst,noteTx){
  var md=$('#md');
  md.innerHTML='<h3>'+title+'</h3><div class="tag">'+(tag||'조사')+'</div><div class="body">'+html+'</div>'
    +'<div class="mrow"><button class="mbtn sub" id="inX">닫기</button></div>';
  $('#inX').addEventListener('click',function(){ $('#mdWrap').classList.remove('on'); SFX.tick(); });
  $('#mdWrap').classList.add('on');
  if(noteTx) note(noteTx);
  if(onFirst && !G.flags['insp_'+title]){ G.flags['insp_'+title]=1; save(); onFirst(); }
}
$('#btnNote').addEventListener('click',function(){
  AudioBoot();
  var h='';
  if(G.notes.length===0) h='<div class="paper">아직 적어 둔 것이 없다.</div>';
  else { h='<div class="paper">'; G.notes.forEach(function(n){ h+='· '+n+'\n'; }); h+='</div>'; }
  var fl=Object.keys(G.frag);
  if(fl.length){
    h+='<div style="font-size:12px;color:var(--dim);margin-top:8px">모은 글자 조각</div><div class="frags">';
    fl.sort().forEach(function(L){ h+='<div class="frag"><b>'+L+'</b><small>'+'★'.repeat(G.frag[L])+'</small></div>'; });
    h+='</div>';
  }
  openInspect('수첩','기록은 흔적만 남는다 — 모양과 숫자는 눈으로 다시 확인할 것',h);
});

/* ---------- 슬롯 ---------- */
var mdWin=null;
function openSlot(id, onWin){
  var S=EP.slots[id];
  if(G.solved[id]){ if(onWin) onWin(); return; }
  mdWin=function(){
    G.solved[id]=1; save(); updHud();
    $('#mdWrap').classList.remove('on');
    SFX.ok();
    if(S.successMsg) toast(S.successMsg,2600);
    setTimeout(function(){ if(S.onSolve) S.onSolve(); if(onWin) onWin(); else drawScene(); }, S.successMsg?900:250);
  };
  var md=$('#md');
  var bodyHtml = (typeof S.body==='function')?S.body():S.body;
  var html='<h3>'+S.name+'</h3><div class="tag">'+(S.kind==='quiz'?'QUIZ':'MISSION')+' · '+S.tag+'</div>';
  html+='<div class="body">'+bodyHtml+'</div><div id="mdGame"></div>';
  html+='<div class="hintrow"><button class="hbtn2" id="hX" style="margin-left:auto">닫기</button></div>';
  md.innerHTML=html;
  $('#hX').addEventListener('click',function(){ $('#mdWrap').classList.remove('on'); SFX.tick(); });
  BUILD[S.type](S, $('#mdGame'));
  $('#mdWrap').classList.add('on');
}
function wrong(S,msg){ SFX.no(); toast(msg||S.wrongMsg||'…아닌 것 같다.'); }

/* ---------- 퍼즐 빌더 ---------- */
var BUILD={
  text:function(S,box){
    box.innerHTML='<input type="text" id="txIn" placeholder="'+(S.ph||'정답 입력')+'" autocomplete="off">'
      +'<div class="mrow"><button class="mbtn" id="txGo">확인</button></div>';
    function chk(){
      var v=norm($('#txIn').value); if(!v) return;
      if(S.answers.indexOf(v)>=0){ mdWin(); return; }
      if(S.nears && S.nears[v]){ SFX.no(); toast(S.nears[v],3000); return; }
      wrong(S);
    }
    $('#txGo').addEventListener('click',chk);
    $('#txIn').addEventListener('keydown',function(e){ if(e.key==='Enter') chk(); });
  },
  pad:function(S,box){
    var cur='';
    var extra=S.dual?'<div class="dualwin"><div class="dw"><div class="sym">'+S.dual[0]+'</div><div class="win" id="dw0">··</div></div>'
      +'<div class="dw"><div class="sym">'+S.dual[1]+'</div><div class="win" id="dw1">··</div></div></div>':'<div class="padview" id="pv">&nbsp;</div>';
    box.innerHTML=extra+'<div class="pad" id="pd"></div>';
    function paint(){
      if(S.dual){ $('#dw0').textContent=(cur.slice(0,2)||'··'); $('#dw1').textContent=(cur.slice(2,4)||'··'); }
      else $('#pv').textContent=cur||' ';
    }
    var pd=$('#pd');
    ['1','2','3','4','5','6','7','8','9','지움','0','확인'].forEach(function(k){
      var b=document.createElement('button'); b.textContent=k;
      if(k==='지움'||k==='확인') b.style.fontSize='14px';
      b.addEventListener('click',function(){
        SFX.tick();
        if(k==='지움'){ cur=''; }
        else if(k==='확인'){ if(cur===S.code) { mdWin(); return; } wrong(S); cur=''; }
        else if(cur.length<S.code.length){ cur+=k; }
        paint();
      });
      pd.appendChild(b);
    });
  },
  memory2:function(S,box){
    var round=0, seq=[], expect=[], inp=[], busy=false;
    box.innerHTML='<div class="cups" id="cups"></div><div class="mstat" id="mst">[순서 보기]로 시작하세요</div>'
      +'<div class="mrow"><button class="mbtn" id="mmGo">순서 보기</button></div>';
    function buildCups(){
      var R=S.rounds[round], cups=$('#cups'); cups.innerHTML='';
      for(var i=0;i<R.cups;i++){ (function(i){
        var c=document.createElement('div'); c.className='cup'; c.textContent=(i+1);
        c.addEventListener('click',function(){ tap(i,c); }); cups.appendChild(c);
      })(i); }
    }
    function lit(i,cb,fast){ var c=$('#cups').children[i]; c.classList.add('lit'); SFX.note(392+i*66,.15);
      setTimeout(function(){ c.classList.remove('lit'); setTimeout(cb,fast?70:160); }, fast?185:380); }
    function playSeq(){
      var R=S.rounds[round];
      busy=true; inp=[]; seq=R.seq;
      expect=R.reverse?seq.slice().reverse():seq.slice();
      $('#mst').innerHTML=(round+1)+' / '+S.rounds.length+' 라운드'+(R.fast?' — <b>훨씬 빠르다!</b>':'')+' 잘 보세요';
      var i=0;
      (function step(){ if(i>=seq.length){ busy=false;
          $('#mst').innerHTML=R.reverse?'노인: "이번엔— 콩이 걸어온 길을 <b>거꾸로</b> 짚어라!"':'순서대로 탭!';
          return; } lit(seq[i++],step,R.fast); })();
    }
    function tap(i,c){
      if(busy) return;
      c.classList.add('lit'); SFX.note(392+i*66,.1); setTimeout(function(){c.classList.remove('lit')},180);
      inp.push(i);
      var k=inp.length-1;
      if(expect[k]!==i){ wrong(S); inp=[]; busy=true;
        $('#mst').textContent='노인이 껄껄 웃는다. "눈이 흔들렸구나!" — 같은 판을 다시!';
        setTimeout(function(){ busy=false; playSeq(); },1000); return; }
      if(inp.length===expect.length){
        round++;
        if(round>=S.rounds.length){ mdWin(); }
        else { $('#mst').textContent='좋아요! 다음 판…'; SFX.get(); busy=true; setTimeout(function(){ buildCups(); playSeq(); },900); }
      }
    }
    $('#mmGo').addEventListener('click',function(){ if(!busy) playSeq(); });
    buildCups();
  },
  timing2:function(S,box){
    var pos=0, dir=1, speed=S.speed||1.2, ok=0, t=0, timer=null, alive=true, dblArmed=false, dblAt=0;
    box.innerHTML='<div class="tmwrap"><div class="tmbar" id="tb"><div class="tmzone" id="tz"></div><div class="tmneedle" id="tn"></div></div>'
      +'<div class="tmdots" id="td"></div><div class="mstat" id="tst">하얗게 굳는 자리에서, 정확히.</div>'
      +'<div class="mrow"><button class="mbtn" id="tGo">밟는다!</button></div></div>';
    var td=$('#td'); for(var i=0;i<S.steps.length;i++){ td.appendChild(document.createElement('i')); }
    function zone(){ var st=S.steps[Math.min(ok,S.steps.length-1)];
      var c=st.c + (st.drift? 8*Math.sin(t*0.045) : 0);
      return {c:c, w:st.w, dbl:!!st.dbl};
    }
    function paintDots(){ for(var i=0;i<S.steps.length;i++){ td.children[i].className = i<ok?'ok':''; } }
    timer=setInterval(function(){
      if(!alive) return;
      t++;
      pos+=dir*speed; if(pos>=100){pos=100;dir=-1;} if(pos<=0){pos=0;dir=1;}
      $('#tn').style.left='calc('+pos+'% - 2px)';
      var z=zone();
      $('#tz').style.left=(z.c-z.w/2)+'%'; $('#tz').style.width=z.w+'%';
      if(dblArmed && (Date.now()-dblAt)>1500){ dblArmed=false; ok=Math.max(0,ok-1); paintDots();
        $('#tst').textContent='두 번째 발이 늦었다! 한 걸음 미끄러졌다.'; SFX.no(); }
    },16);
    var obs=new MutationObserver(function(){ if(!document.body.contains(box)){ clearInterval(timer); obs.disconnect(); } });
    obs.observe(document.body,{childList:true,subtree:true});
    $('#tGo').addEventListener('click',function(){
      if(!alive) return;
      var z=zone();
      var hit = Math.abs(pos-z.c) <= z.w/2;
      if(!hit){ SFX.no(); ok=Math.max(0,ok-2); dblArmed=false; paintDots();
        $('#tst').textContent='발이 구름을 뚫었다…! 두 걸음 미끄러져 내려왔다.'; return; }
      if(z.dbl && !dblArmed){ dblArmed=true; dblAt=Date.now(); SFX.tick();
        $('#tst').innerHTML='마지막 발판이 갈라진다 — <b>한 번 더!</b>'; return; }
      ok++; dblArmed=false; SFX.get(); paintDots();
      speed+=S.accel||0.22;
      $('#tst').textContent='단단하다! ('+ok+'/'+S.steps.length+')';
      if(ok>=S.steps.length){ alive=false; clearInterval(timer); mdWin(); }
    });
  },
  rings:function(S,box){
    var cur=S.startAt.slice();
    box.innerHTML='<div class="rings" id="rg"></div><div class="mrow"><button class="mbtn" id="rGo">자물쇠 확인</button></div>';
    var rg=$('#rg');
    S.ringSets.forEach(function(set,ri){
      var d=document.createElement('div'); d.className='ring';
      d.innerHTML='<span style="font-size:11px;color:var(--dim)">'+(ri+1)+'번</span><span class="cur" id="rc'+ri+'">'+set[cur[ri]]+'</span>';
      var b=document.createElement('button'); b.className='rb'; b.textContent='⟳';
      b.addEventListener('click',function(){ SFX.tick(); cur[ri]=(cur[ri]+1)%set.length; $('#rc'+ri).textContent=set[cur[ri]]; });
      d.appendChild(b); rg.appendChild(d);
    });
    $('#rGo').addEventListener('click',function(){
      var okAll=S.targets.every(function(tg,i){ return S.ringSets[i][cur[i]]===tg; });
      if(okAll) mdWin(); else wrong(S);
    });
  },
  grid:function(S,box){
    var stepIdx=0, N=S.cols*S.rows;
    box.innerHTML='<div class="gridN" id="gd" style="grid-template-columns:repeat('+S.cols+',1fr)"></div>'
      +'<div class="mstat" id="gst">희미하게 빛나는 타일이 하나 있다.</div>';
    var gd=$('#gd');
    for(var i=0;i<N;i++){ (function(i){
      var c=document.createElement('div'); c.className='gcell';
      if(i===S.path[0]){ c.classList.add('start'); c.textContent='★'; }
      c.addEventListener('click',function(){
        SFX.tick();
        if(i===S.path[stepIdx]){ c.classList.add('path'); c.textContent='✦'; stepIdx++;
          if(stepIdx>=S.path.length){ mdWin(); } }
        else { c.classList.add('bad'); setTimeout(function(){c.classList.remove('bad')},350);
          SFX.no(); stepIdx=0; $('#gst').textContent='빛이 꺼졌다… 처음 별부터 다시.';
          for(var j=0;j<N;j++){ gd.children[j].classList.remove('path'); gd.children[j].textContent=(j===S.path[0])?'★':''; } }
      });
      gd.appendChild(c);
    })(i); }
  },
  rhythm2:function(S,box){
    var inp=[], mode='free', fails=0;
    var lst = G.listen[S.id2]||0;
    box.innerHTML='<div class="harp" id="hp"></div>'
      +'<div class="mstat" id="hst"></div>'
      +'<div class="mrow"><button class="mbtn sub" id="hDemo">노래 듣기 (<span id="hCnt"></span>)</button><button class="mbtn" id="hTry">연주 도전</button></div>';
    var hp=$('#hp');
    S.notes.forEach(function(f,i){
      var d=document.createElement('div'); d.className='hstr h'+(i+1)+'s';
      d.addEventListener('click',function(){
        d.classList.add('lit'); SFX.pluck(f); setTimeout(function(){d.classList.remove('lit')},220);
        if(mode==='try') judge(i);
      });
      hp.appendChild(d);
    });
    function cnt(){ $('#hCnt').textContent=(S.maxListen-(G.listen[S.id2]||0))+'회 남음'; }
    function stat(){
      var m = G.muted?'<b style="color:#e06a5a">⚠ 소리를 켜야 풀 수 있는 문제입니다.</b><br>':'';
      $('#hst').innerHTML=m+(mode==='free'
        ?'줄을 자유롭게 튕겨 음을 귀에 익히세요. (무제한)'
        :'도전 중 — 들은 노래를 그대로 연주! ('+inp.length+'/'+S.seq.length+')');
    }
    $('#hDemo').addEventListener('click',function(){
      var used=G.listen[S.id2]||0;
      if(used>=S.maxListen){ toast('하프가 목이 쉰 듯 조용하다.<br>더는 들려주지 않을 모양이다.'); return; }
      G.listen[S.id2]=used+1; save(); cnt();
      mode='free'; inp=[]; stat();
      $('#hst').innerHTML='듣는 중… <b>(빛나지 않는다 — 소리에 집중!)</b>';
      var i=0;(function step(){ if(i>=S.seq.length){ stat(); return; }
        SFX.pluck(S.notes[S.seq[i++]]); setTimeout(step,600); })();
    });
    $('#hTry').addEventListener('click',function(){ mode='try'; inp=[]; stat(); });
    function judge(i){
      inp.push(i); var k=inp.length-1;
      if(S.seq[k]!==i){ wrong(S); inp=[]; fails++;
        if(fails>=5){ fails=0; G.listen[S.id2]=Math.max(0,(G.listen[S.id2]||0)-1); save(); cnt();
          toast('하프가 안쓰러운 듯 한숨을 쉰다.<br><b>듣기 1회가 되살아났다.</b>',2800); }
        mode='free'; stat(); return; }
      stat();
      if(inp.length===S.seq.length){ setTimeout(mdWin,300); }
    }
    cnt(); stat();
  },
  assemble:function(S,box){
    var placed=[];
    var letters=Object.keys(G.frag).sort();
    if(letters.length<5){

function openConn(C){
  var doneKey='conn_'+C.key, idx=0;
  var md=$('#md');
  var W=110,H=140;
  var html='<h3>'+C.name+'</h3><div class="tag">밤하늘 · 별과 별을 잇는다</div>'
    +'<div class="body">'+ (C.desc||'가장 밝은 별에서 시작해, 별을 순서대로 이어 보자.<br>흐린 별은 별자리의 별이 아니다.') +'</div>'
    +'<div class="connwrap" id="cw"><svg id="cs" viewBox="0 0 '+W+' '+H+'"></svg></div>'
    +'<div class="mstat" id="cst"></div>'
    +'<div class="mrow"><button class="mbtn sub" id="cX">닫기</button></div>';
  md.innerHTML=html;
  var svg=$('#cs'), wrap=$('#cw');
  function seg(a,b){ var l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',a[0]); l.setAttribute('y1',a[1]); l.setAttribute('x2',b[0]); l.setAttribute('y2',b[1]);
    l.setAttribute('class','cl'); svg.appendChild(l); }
  function reset(){ idx=0; svg.innerHTML=''; wrap.classList.remove('glow'); drawStars(); $('#cst').textContent='빛나는 별부터.'; }
  function complete(){
    wrap.classList.add('glow'); $('#cst').innerHTML='선이 금빛으로 타오른다…!<br><b>무언가의 모양이 떠올랐다.</b>';
    if(!G.flags[doneKey]){ G.flags[doneKey]=1; save(); SFX.reveal(); note(C.name+'을(를) 이었다 — 모양은 눈에 새겨 두자'); }
    else SFX.get();
  }
  function drawStars(){
    C.stars.forEach(function(p,i){
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',p[0]); c.setAttribute('cy',p[1]);
      c.setAttribute('r', i===C.path[0]?4.6:3.2);
      c.setAttribute('fill', i===C.path[0]?'#ffe9a8':'#f0e2b8');
      if(i===C.path[0]) c.setAttribute('style','filter:drop-shadow(0 0 3px #ffd769)');
      svg.appendChild(c);
    });
    C.decoys.forEach(function(p){
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',p[0]); c.setAttribute('cy',p[1]); c.setAttribute('r',2.6);
      c.setAttribute('fill','#f0e2b8'); c.setAttribute('opacity','.38'); svg.appendChild(c);
    });
    /* 탭 타깃 */
    C.stars.forEach(function(p,i){ tapC(p,function(){ tapStar(i); }); });
    C.decoys.forEach(function(p){ tapC(p,function(){ SFX.no(); $('#cst').textContent='…흐린 별이다. 선이 흩어졌다.'; svgLinesClear(); idx=0; }); });
  }
  function svgLinesClear(){ Array.prototype.slice.call(svg.querySelectorAll('line')).forEach(function(l){l.remove()}); wrap.classList.remove('glow'); }
  function tapC(p,fn){
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p[0]); c.setAttribute('cy',p[1]); c.setAttribute('r',9);
    c.setAttribute('fill','transparent'); c.setAttribute('style','cursor:pointer');
    c.addEventListener('click',fn); svg.appendChild(c);
  }
  function tapStar(i){
    if(G.flags[doneKey] && idx===0){ /* 완성 후 재열람 시에도 다시 이어볼 수 있음 */ }
    if(i===C.path[idx]){
      SFX.note(520+idx*40,.12);
      if(idx>0) seg(C.stars[C.path[idx-1]], C.stars[C.path[idx]]);
      idx++;
      if(idx>=C.path.length) complete();
      else $('#cst').textContent='…이어진다. ('+idx+'/'+C.path.length+')';
    } else if(idx>0){ SFX.no(); $('#cst').textContent='선이 어긋나 흩어졌다. 처음 별부터.'; svgLinesClear(); idx=0; }
    else { SFX.no(); $('#cst').textContent='이 별은 시작이 아니다. 가장 밝은 별부터.'; }
  }
  $('#cX').addEventListener('click',function(){ $('#mdWrap').classList.remove('on'); SFX.tick(); });
  if(G.flags[doneKey]){
    drawStars();
    for(var k=1;k<C.path.length;k++) seg(C.stars[C.path[k-1]],C.stars[C.path[k]]);
    wrap.classList.add('glow'); $('#cst').innerHTML='한 번 이어 본 별자리다.<br><b>모양이 다시 금빛으로 떠오른다.</b>';
  } else { drawStars(); $('#cst').textContent='빛나는 별부터.'; }
  $('#mdWrap').classList.add('on');
}

function openScope(SC){

    s+='<polyline points="'+pts.map(function(p){return p.join(',')}).join(' ')+'" fill="none" stroke="#ffd769" stroke-width="1.4" opacity=".8"/>';
    pts.forEach(function(p,i){ s+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="'+(i===0?4:2.6)+'" fill="'+(i===0?'#ffe9a8':'#f0e2b8')+'"/>'; });
    for(var i=0;i<10;i++){ s+='<circle cx="'+((i*37)%100+3)+'" cy="'+((i*53)%100+2)+'" r="1" fill="#f0e2b8" opacity=".3"/>'; }

  var focused = G.flags.scope===1;

    +'<div class="body">'+(focused?'렌즈 너머, 별자리 하나가 또렷하다.<br><b>거인자리</b> — 별 아홉이 이어진 모양을 눈에 새기자.':'렌즈 세 개의 고리가 제멋대로 돌아가 있다.')+'</div>'
    +'<div class="scopewrap"><div class="scopeview">'+constSvg()+'</div>'
    +(focused?'':'<div class="dials" id="dl"></div>')
    +'<div class="mstat" id="sst"></div></div>'
    +'<div class="mrow"><button class="mbtn sub" id="scX">닫기</button></div>';

    $('#sst').textContent = blurPx()===0?'':'…흐릿하다. 고리를 돌려 초점을 맞추자.'; }
  if(!focused){
    var dl=$('#dl');
    for(var i=0;i<3;i++){ (function(i){
      var b=document.createElement('button'); b.textContent=(i+1)+'번 고리 ⟳';
      b.addEventListener('click',function(){ SFX.tick(); cur[i]=(cur[i]+1)%4; G.flags.scopeDial=cur; save(); paint();
        if(blurPx()===0){ G.flags.scope=1; save(); SFX.reveal(); note('망원경으로 거인자리를 보았다 — 모양은 눈에 새겨 두자');
          $('#sst').innerHTML='<b>초점이 맞았다! 거인자리가 또렷하다.</b>'; $('#dl').style.display='none';
          $('#md h3').nextElementSibling.textContent='천문실 · 또렷하다'; drawScene(); $('#mdWrap').classList.add('on'); } });
      dl.appendChild(b);
    })(i); }
  }
  paint();
  $('#scX').addEventListener('click',function(){ $('#mdWrap').classList.remove('on'); SFX.tick(); });
  $('#mdWrap').classList.add('on');
}

var AC=null, master=null, ambTimer=null;
function AudioBoot(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=G&&G.muted?0:0.5; master.connect(AC.destination);
    startAmb();
  }catch(e){}
}
function tone(f,dur,type,vol,delay,slide){
  if(!AC||!master) return;
  var t=AC.currentTime+(delay||0);
  var o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+dur);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||.18,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.05);
}

  tick:function(){ tone(880,.06,'square',.05); },
  ok:function(){ tone(523.25,.14,'triangle',.2); tone(659.25,.16,'triangle',.2,.1); tone(783.99,.3,'triangle',.22,.2); },
  no:function(){ tone(196,.22,'sawtooth',.12); tone(185,.28,'sawtooth',.1,.12); },
  get:function(){ tone(659.25,.1,'triangle',.18); tone(880,.22,'triangle',.2,.09); },
  tr:function(){ tone(329.63,.3,'sine',.16,0,392); },
  boom:function(){ tone(70,.9,'sine',.4,0,45); tone(90,.7,'triangle',.2,.05,50); },
  axe:function(){ tone(120,.1,'square',.25); tone(60,.4,'sine',.3,.03,40); },
  reveal:function(){ [261.63,329.63,392,523.25,659.25].forEach(function(f,i){ tone(f,1.2,'triangle',.14,i*.14); }); },
  note:function(f,d){ tone(f,d||.2,'triangle',.2); },
  pluck:function(f){ tone(f,.7,'triangle',.28); tone(f*2,.4,'sine',.08,.01); }
};
var MOTIF=[440,392,329.63,392,440,523.25,440]; /* 라솔미솔라도라 */
function playMotif(inst){
  if(!AC) return;
  MOTIF.forEach(function(f,i){
    if(inst==='piri') tone(f*2,.34,'triangle',.14,i*.42);
    else if(inst==='hum') tone(f/2,.5,'sine',.16,i*.46);
    else tone(f,.9,'triangle',.2,i*.44);
  });
}
function startAmb(){
  if(ambTimer) return;
  var padNotes=[110,130.81,164.81,146.83], pi=0;
  ambTimer=setInterval(function(){
    if(!AC||(G&&G.muted)) return;
    var f=padNotes[pi++%padNotes.length];
    tone(f,5.5,'sine',.045); tone(f*1.5,5.5,'sine',.025,.1);
  },6000);
  tone(padNotes[0],5.5,'sine',.045);
}

/* ================= BOOT ================= */
function startPlay(){
  $('#hud').style.display='flex';
  $('#hudSub').textContent=EP.epi.replace(/\s/g,'')+' '+EP.title.replace(/\n/g,' ');
  updHud();
  runBeat();
}
(function boot(){
  document.title=EP.pageTitle;
  $('#tTitle').textContent=EP.title;
  $('#tEpi').textContent=EP.epi;
  $('#tMeta').style.display='none';
  setBG(EP.titleBG);
  var sv=load();
  if(sv && sv.bi>0 && !sv.lastEnd){ $('#btnCont').style.display='block'; }
  $('#btnStart').addEventListener('click',function(){
    AudioBoot(); SFX.tr();
    var ends=sv?sv.ends:[];
    G=defState(); G.ends=ends||[]; save(); startPlay();
  });
  $('#btnCont').addEventListener('click',function(){
    AudioBoot(); SFX.tr();
    G=sv; save(); startPlay();
  });
  G=sv||defState();
  window.GL={get G(){return G}, EP:EP, next:next, openSlot:openSlot, openConn:openConn, openScope:openScope, runBeat:runBeat, save:save, drawScene:drawScene};
})();
</script>
</body>
