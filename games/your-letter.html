<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>너의 편지를 아직 읽지 못했어 — 리마스터드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#f2a7bb;--rose:#e8637a;--cream:#fff8f5;--soft:#fde8ee;
  --text:#3a2030;--gray:#9a8090;--gold:#d4a853;--dark:#2a1520;
  --parch:#fdf6e3;--parch2:#f5e6c0;--ink:#4a3520;
  --font:'Noto Serif KR','Georgia',serif;
}
html,body{height:100%;background:var(--cream);}
body{font-family:var(--font);color:var(--text);overflow-x:hidden;}
#app{max-width:480px;margin:0 auto;min-height:100%;position:relative;}

/* ─── TITLE ─── */
#ts{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 28px;text-align:center;
  background:linear-gradient(160deg,#fff0f5 0%,#ffe4ed 60%,#ffd6e7 100%);}
#ts h1{font-size:1.65rem;line-height:1.7;color:var(--rose);margin-bottom:10px;letter-spacing:-0.3px;}
#ts .sub{font-size:0.88rem;color:var(--gray);margin-bottom:44px;line-height:1.9;}
.deco{font-size:2.8rem;margin-bottom:22px;animation:flt 3s ease-in-out infinite;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* ─── BUTTONS ─── */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:50px;
  font-family:var(--font);font-size:0.98rem;cursor:pointer;transition:transform .12s,opacity .12s;}
.btn:active{transform:scale(0.96);}
.btn-main{background:linear-gradient(135deg,var(--rose),var(--pink));color:#fff;
  box-shadow:0 5px 22px rgba(232,99,122,.3);margin-bottom:13px;}
.btn-sec{background:#fff;color:var(--rose);border:2px solid var(--pink);}
.btn-gold{background:linear-gradient(135deg,#d4a853,#e8c070);color:#fff;margin-bottom:13px;}

/* ─── GAME SCREEN ─── */
#gs{display:none;flex-direction:column;min-height:100vh;}
#gs.on{display:flex;}

/* ─── TOP BAR ─── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:#fff;border-bottom:1px solid #f0dce4;
  position:sticky;top:0;z-index:20;}
.topbar-left{flex:1;}
.ch-lbl{font-size:0.7rem;color:var(--gray);letter-spacing:.5px;}
.ch-ttl{font-size:0.92rem;color:var(--rose);font-weight:700;margin-top:1px;}
.topbar-btns{display:flex;gap:8px;align-items:center;}
.icon-btn{background:var(--soft);border:none;border-radius:20px;
  padding:7px 13px;font-size:0.8rem;color:var(--rose);cursor:pointer;
  transition:background .15s;}
.icon-btn:active{background:var(--pink);color:#fff;}

/* ─── PROGRESS ─── */
.prog-wrap{background:#f0dce4;height:3px;}
.prog-bar{height:3px;background:linear-gradient(90deg,var(--rose),var(--pink));transition:width .5s;}

/* ─── STORY AREA ─── */
.story-area{flex:1;padding:26px 22px 40px;overflow-y:auto;}
.story-area.fade-in{animation:fade .5s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─── SCENE CARD ─── */
.scene-card{width:100%;height:150px;border-radius:18px;
  background:linear-gradient(135deg,#fde8ee,#ffe4ed);
  display:flex;align-items:center;justify-content:center;
  font-size:3.8rem;margin-bottom:22px;position:relative;overflow:hidden;}
.scene-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 60%,rgba(255,240,245,.5));}

/* ─── STORY TEXT ─── */
.story-txt{font-size:0.93rem;line-height:2;color:var(--text);}
.story-txt em{color:var(--rose);font-style:normal;font-weight:700;}
.story-txt .quote{color:var(--rose);font-style:italic;}
.tw-cursor{display:inline-block;width:2px;height:1.1em;background:var(--rose);
  margin-left:1px;vertical-align:text-bottom;animation:blink .7s step-end infinite;}
@keyframes blink{50%{opacity:0}}

/* ─── LETTER UI ─── */
.letter-wrap{background:var(--parch);border:1px solid var(--parch2);
  border-radius:4px;padding:24px 20px;margin-bottom:20px;position:relative;
  box-shadow:2px 3px 12px rgba(180,140,80,.15);
  font-style:italic;color:var(--ink);line-height:2.1;font-size:0.9rem;}
.letter-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),transparent,var(--gold));}
.letter-from{font-size:0.78rem;color:var(--gold);text-align:right;margin-top:14px;
  font-style:normal;letter-spacing:.5px;}

/* ─── PUZZLE AREA ─── */
.puz-area{background:#fff;border-radius:20px;padding:22px 18px;margin:18px 0;
  box-shadow:0 3px 18px rgba(232,99,122,.1);}
@keyframes correct-glow{0%{box-shadow:0 3px 18px rgba(212,168,83,.1)}
  50%{box-shadow:0 0 24px rgba(212,168,83,.45)}
  100%{box-shadow:0 3px 18px rgba(212,168,83,.1)}}
.puz-area.correct{animation:correct-glow .9s ease;}
.puz-ttl{font-size:0.8rem;color:var(--gray);margin-bottom:10px;text-align:center;letter-spacing:.5px;}
.puz-dsc{font-size:0.88rem;color:var(--text);margin-bottom:16px;line-height:1.75;text-align:center;}

/* ─── CODE4 ─── */
.num-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.dgt{width:54px;height:66px;border:2px solid var(--pink);border-radius:13px;
  font-size:1.6rem;text-align:center;background:#fff;color:var(--rose);
  font-family:var(--font);outline:none;transition:border-color .2s;}
.dgt:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,99,122,.12);}

/* ─── CHOICES ─── */
.c-grid{display:flex;flex-direction:column;gap:10px;}
.c-btn{padding:14px 16px;border:2px solid var(--pink);border-radius:13px;
  background:#fff;font-family:var(--font);font-size:0.88rem;
  color:var(--text);cursor:pointer;text-align:left;transition:all .15s;line-height:1.5;}
.c-btn:active{background:var(--soft);}
.c-btn.ok{background:#e8f5e9;border-color:#66bb6a;color:#1b5e20;}
.c-btn.no{background:#ffebee;border-color:#ef9a9a;color:#b71c1c;}

/* ─── MEMORY ─── */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.mem-card{aspect-ratio:1;border-radius:11px;background:var(--rose);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .25s;user-select:none;}
.mem-card:active{transform:scale(.93);}
.mem-card.flp,.mem-card.mat{background:var(--soft);}
.mem-card:not(.flp):not(.mat)::before{content:'🌸';font-size:1.2rem;}
.mem-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.35rem;}

/* ─── TAP SEQ ─── */
.tap-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
.tap-btn{width:65px;height:65px;border-radius:50%;background:var(--soft);
  border:2px solid var(--pink);font-size:1.35rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;user-select:none;}
.tap-btn:active{transform:scale(.92);}

/* ─── SIMON ─── */
.simon-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:210px;margin:0 auto 16px;}
.s-btn{height:78px;border-radius:16px;background:var(--soft);
  border:2px solid var(--pink);font-size:1.75rem;cursor:pointer;transition:background .15s;}

/* ─── DRAG (PICK & PLACE) ─── */
.drag-src{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.drag-item{padding:12px 16px;border:2px solid var(--pink);border-radius:12px;
  background:#fff;font-size:0.86rem;color:var(--text);cursor:pointer;
  transition:all .15s;line-height:1.5;user-select:none;}
.drag-item.selected{background:var(--soft);border-color:var(--rose);
  box-shadow:0 0 0 3px rgba(232,99,122,.15);}
.drag-item.placed{background:#f5f5f5;color:#aaa;border-color:#ddd;cursor:default;}
.drag-slots{display:flex;flex-direction:column;gap:8px;}
.drag-slot{padding:12px 16px;border:2px dashed var(--pink);border-radius:12px;
  background:var(--soft);font-size:0.86rem;color:var(--gray);min-height:48px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;}
.drag-slot.filled{background:#fff;color:var(--text);border-style:solid;border-color:var(--rose);}
.drag-slot.filled:active{background:var(--soft);}
.slot-num{font-size:0.75rem;color:var(--rose);font-weight:700;min-width:18px;}

/* ─── TIMER ─── */
.timer-wrap{margin-bottom:14px;}
.timer-bar-bg{background:#f0dce4;border-radius:10px;height:8px;overflow:hidden;}
.timer-bar{height:8px;background:linear-gradient(90deg,var(--rose),#ff8ca0);
  border-radius:10px;transition:width .5s linear;}
.timer-bar.urgent{background:linear-gradient(90deg,#c62828,#ef5350);animation:timer-pulse .5s ease-in-out infinite;}
@keyframes timer-pulse{0%,100%{opacity:1}50%{opacity:.65}}
.timer-num{text-align:right;font-size:0.78rem;color:var(--rose);margin-top:5px;}
.timer-num.urgent{color:#c62828;font-weight:700;}
.scene-card.type-memory{background:linear-gradient(135deg,#f3e5f5,#e1bee7);}
.scene-card.type-letter{background:linear-gradient(135deg,#fdf6e3,#f5e6c0);}
.scene-card.type-final{background:linear-gradient(135deg,#2a1a30,#5a2050);}
.scene-card.type-haram{background:linear-gradient(135deg,#e3f2fd,#b3d9f7);}
.scene-card.type-ending{background:linear-gradient(135deg,#fce4ec,#f8bbd9);}

/* ─── TEXT INPUT ─── */
.txt-inp{width:100%;padding:14px;border:2px solid var(--pink);border-radius:13px;
  font-family:var(--font);font-size:1rem;color:var(--text);
  background:#fff;outline:none;text-align:center;letter-spacing:2px;}
.txt-inp:focus{border-color:var(--rose);}

/* ─── FEEDBACK ─── */
.fb{text-align:center;padding:12px;border-radius:12px;font-size:0.87rem;
  margin-top:10px;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f5e9;color:#1b5e20;}
.fb.no{background:#ffebee;color:#b71c1c;}

/* ─── HINT PANEL ─── */
.hint-panel{background:linear-gradient(135deg,#fffdf0,#fff8e0);
  border:1px solid var(--gold);border-radius:16px;
  padding:18px;margin:14px 0;display:none;}
.hint-panel.open{display:block;animation:fade .3s ease;}
.hint-panel h4{color:var(--gold);margin-bottom:8px;font-size:0.88rem;}
.hint-panel p{font-size:0.87rem;line-height:1.8;color:var(--ink);}

/* ─── ENDING SCREEN ─── */
#es{display:none;flex-direction:column;min-height:100vh;background:var(--cream);}
#es.on{display:flex;}
.end-top{flex:1;padding:50px 28px 30px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;}
.end-icon{font-size:3rem;margin-bottom:22px;animation:flt 3s ease-in-out infinite;}
.end-ttl{font-size:1.45rem;color:var(--rose);margin-bottom:20px;line-height:1.6;}
.end-body{font-size:0.91rem;line-height:2.1;color:var(--text);max-width:400px;white-space:pre-wrap;}
.epilogue-sep{text-align:center;color:var(--gold);font-size:1.1rem;margin:26px 0 14px;letter-spacing:4px;}
.epilogue-body{font-size:0.88rem;line-height:2;color:var(--gray);max-width:400px;
  font-style:italic;white-space:pre-wrap;}
.end-actions{padding:24px 28px 50px;display:flex;flex-direction:column;gap:10px;}

/* ─── SKIP HINT ─── */
.skip-hint{text-align:center;font-size:0.75rem;color:var(--pink);margin-top:8px;
  animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ─── CHAPTER DIVIDER ─── */
.ch-sep{text-align:center;color:var(--pink);font-size:.8rem;margin:20px 0;letter-spacing:3px;}

/* ─── RESPONSIVE ─── */
@media(max-width:360px){
  .dgt{width:46px;height:58px;font-size:1.4rem;}
  .tap-btn{width:56px;height:56px;}
  .mem-inner{font-size:1.15rem;}
}
</style>
</head>
<body>
<div id="app">

<!-- TITLE SCREEN -->
<div id="ts">
  <div class="deco">💌</div>
  <h1>너의 편지를<br>아직 읽지 못했어</h1>
  <p class="sub">3년 전 사라진 그 사람의 방에<br>열쇠 하나가 왔다</p>
  <button class="btn btn-main" onclick="G.start()">문을 열다</button>
  <button class="btn btn-sec" onclick="G.load()">이어하기</button>
</div>

<!-- GAME SCREEN -->
<div id="gs">
  <div class="prog-wrap"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <div class="topbar">
    <div class="topbar-left">
      <div class="ch-lbl" id="cl">PROLOGUE</div>
      <div class="ch-ttl" id="ct">열쇠</div>
    </div>
    <div class="topbar-btns">
      <button class="icon-btn" id="bgm-btn" onclick="G.toggleBGM()" title="BGM 켜기">🎵</button>
      <button class="icon-btn" onclick="G.toggleHint()">💡 힌트</button>
    </div>
  </div>
  <div class="story-area" id="sa"></div>
</div>

<!-- ENDING SCREEN -->
<div id="es">
  <div class="end-top">
    <div class="end-icon" id="ei">💌</div>
    <div class="end-ttl" id="ett"></div>
    <div class="end-body" id="eb"></div>
    <div class="epilogue-sep" id="ep-sep" style="display:none">· · · · ·</div>
    <div class="epilogue-body" id="epb"></div>
  </div>
  <div class="end-actions">
    <button class="btn btn-gold" onclick="G.showEpilogue()">에필로그 보기 →</button>
    <button class="btn btn-main" onclick="G.reset()">처음부터</button>
  </div>
</div>

</div>
<script>
// ═══════════════════════════════════════════════
// BGM — Web Audio pentatonic ambient
// ═══════════════════════════════════════════════
let bgmCtx=null,bgmOn=false,bgmTimer=null;
const BGM_NOTES=[523.25,659.25,783.99,880,659.25,523.25,440,523.25];
function getBgmCtx(){if(!bgmCtx)bgmCtx=new(window.AudioContext||window.webkitAudioContext)();return bgmCtx;}
function playNote(freq,t,dur){
  const ctx=getBgmCtx();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.055,t+.12);
  g.gain.linearRampToValueAtTime(0,t+dur-.08);
  o.start(t);o.stop(t+dur);
}
function loopBGM(){
  if(!bgmOn)return;
  const ctx=getBgmCtx(),now=ctx.currentTime,d=0.85;
  BGM_NOTES.forEach((f,i)=>playNote(f,now+i*d,d*.88));
  bgmTimer=setTimeout(loopBGM,BGM_NOTES.length*d*1000);
}

// ═══════════════════════════════════════════════
// TYPEWRITER
// ═══════════════════════════════════════════════
let twCancel=false;
async function typewrite(el,text,speed){
  speed=speed||28;twCancel=false;
  el.innerHTML='';let out='';
  const chars=[...text];
  for(let i=0;i<chars.length;i++){
    if(twCancel){el.innerHTML=text.replace(/\n/g,'<br>').replace(/<em>/g,'<em>').replace(/<\/em>/g,'</em>');return;}
    const c=chars[i];
    if(c==='\n'){out+='<br>';}
    else if(c==='<'){
      // skip html tags, add whole tag at once
      let tag='<';i++;
      while(i<chars.length&&chars[i]!=='>'){tag+=chars[i];i++;}
      tag+='>';out+=tag;el.innerHTML=out+'<span class="tw-cursor"></span>';continue;
    }
    else{out+=c;}
    el.innerHTML=out+'<span class="tw-cursor"></span>';
    const delay=(c==='\n'||c==='。'||c==='.')?speed*4:(c===' '?speed*0.3:speed);
    await new Promise(r=>setTimeout(r,delay));
  }
  el.innerHTML=out;
}

// ═══════════════════════════════════════════════
// CHAPTER DATA
// ═══════════════════════════════════════════════
const CHS=[
// ── 0 프롤로그 ──────────────────────────────
{id:0,lbl:'PROLOGUE',ttl:'열쇠',em:'🔑',tw:true,
story:`오늘 아침 일곱 시.

우편함을 열었을 때 거기 있었다.
열쇠 하나.
그리고 접힌 종이 한 장.

펼쳤다.

<em>—아직 거기 있니?
 나 아직 기억해?</em>

필체를 알아봤다.

세 글자를 쓸 때 'ㅎ'의 꼬리가
오른쪽으로 살짝 올라가는 것.

하람이었다.

3년이었다.
연락 한 번 없던 3년.
전화도 문자도 SNS도 전부 차단.
이유도 없이.

열쇠에 주소가 적혀 있었다.
내가 처음 찾아갔던 그 골목.

나는 신발을 신었다.
이유는 모르겠다.
그냥 신었다.`,puz:null,hint:null},

// ── 1 현관 자물쇠 ────────────────────────────
{id:1,lbl:'CH 1',ttl:'현관 자물쇠',em:'🚪',
story:`골목 안쪽 오래된 빌라.

3층 302호.

낡은 자물쇠가 달려 있었다.
4자리 비밀번호.

기억했다.
우리가 처음 이 앞에 섰을 때,
하람이 번호를 누르면서 말했다.

<em>"기억해두면 언제든 와도 돼."</em>

그 말 때문에 기억했다.

번호 힌트가 열쇠 줄에 묶여 있었다.
종이 쪽지 하나.

<em>"우리가 처음 
손을 잡은 날의 달과 일."</em>

열한 번째 달, 열두 번째 날.`,
puz:{type:'code4',ttl:'현관 자물쇠',
dsc:'처음 손을 잡은 날 — 달과 일을 4자리로 입력하세요',
ans:'1112',hint:'열한 번째 달(11) + 열두 번째 날(12) = 1112'}},

// ── 2 신발장 ──────────────────────────────────
{id:2,lbl:'CH 2',ttl:'신발장',em:'👟',
story:`문이 열렸다.

3년이 지났는데도
방 냄새는 똑같았다.

따뜻하고, 조금 낡은.
그리고 하람의 냄새.

신발장 문이 살짝 열려 있었다.
운동화들이 뒤섞여 있었다.
왼쪽, 오른쪽이 엉켜서.

거기에 쪽지 하나.

<em>"짝이 맞아야
앞으로 갈 수 있어."</em>

8켤레의 신발.
다 섞여 있다.`,
puz:{type:'memory',ttl:'신발 짝 맞추기',
dsc:'같은 짝을 모두 찾으세요 (8쌍)',hint:'같은 이모지가 짝입니다. 기억하며 두 개씩 탭하세요.',
pairs:['👟','👠','🥿','👞','👡','🥾','👢','🩴']}},

// ── 3 [NEW] 첫 번째 회상 — 카페 ──────────────
{id:3,lbl:'MEMORY #1',ttl:'느린 봄, 카페',em:'☕',letter:true,
story:`처음 만난 건 2021년 11월이었다.

'느린 봄'이라는 이름의 카페.
이름처럼 느리게 꾸며진 곳.
창가 자리는 항상 흐릿한 빛이 들어왔다.

하람은 아메리카노를 시켰다.
나는 라떼.
서로 아무 말 없이 창밖을 봤다.

비가 오는 날이었다.

처음 말을 건 건 하람이었다.

'우산 없으세요?'

그게 시작이었다.

별거 없는 대화였다.
날씨, 카페, 근처 서점.

// STATE

let ST={ch:0,hintOpen:false,bgmOn:false,endIdx:null};
function save(){try{localStorage.setItem('rmg2',JSON.stringify(ST));}catch(e){}}

// ═══════════════════════════════════════════════
// MAIN GAME CONTROLLER
// ═══════════════════════════════════════════════
const G={
start(){
  document.getElementById('ts').style.display='none';
  document.getElementById('gs').classList.add('on');
  this.render(ST.ch||0);
},
load(){
  try{
    const s=localStorage.getItem('rmg2');
    if(s){ST=JSON.parse(s);this.start();}
    else alert('저장된 기록이 없어요.');
  }catch(e){alert('저장된 기록이 없어요.');}
},
reset(){
  ST={ch:0,hintOpen:false,bgmOn:false,endIdx:null};
  document.getElementById('es').classList.remove('on');
  document.getElementById('ts').style.display='';
},
async render(id){
  ST.ch=id;save();
  const ch=CHS[id];
  document.getElementById('cl').textContent=ch.lbl;
  document.getElementById('ct').textContent=ch.ttl;
  const pct=Math.round((id/CHS.length)*100);
  document.getElementById('pb').style.width=pct+'%';
  const sa=document.getElementById('sa');
  sa.innerHTML='';
  sa.classList.remove('fade-in');
  void sa.offsetWidth;
  sa.classList.add('fade-in');
  // Scene card
  const sc=document.createElement('div');
  const scType=ch.letter?'type-letter':(ch.lbl&&ch.lbl.includes('MEMORY')?'type-memory':(ch.id>=26?'type-ending':(ch.lbl&&ch.lbl.includes('HARAM')?'type-haram':'')));
  sc.className='scene-card'+(scType?' '+scType:'');
  sc.innerHTML='<span style="position:relative;z-index:1;font-size:3.8rem">'+ch.em+'</span>';
  sa.appendChild(sc);
  // Story
  const stDiv=document.createElement('div');stDiv.className='story-txt';
  if(ch.letter){
    const lw=document.createElement('div');lw.className='letter-wrap';
    lw.innerHTML='<div id="tw-target"></div><div class="letter-from">— 기억 속에서</div>';
    sa.appendChild(lw);
    const twt=lw.querySelector('#tw-target');
    sa.addEventListener('click',()=>{twCancel=true;},{once:true});
    await typewrite(twt,ch.story,22);
  } else if(ch.tw){
    sa.addEventListener('click',()=>{twCancel=true;},{once:true});
    await typewrite(stDiv,ch.story,26);
    sa.appendChild(stDiv);
  } else {
    stDiv.innerHTML=ch.story.replace(/\n/g,'<br>');
    sa.appendChild(stDiv);
  }
  // Hint panel
  const hp=document.createElement('div');hp.className='hint-panel';hp.id='hint-panel';
  hp.innerHTML='<h4>💡 힌트</h4><p>'+(ch.puz?.hint||ch.hint||'이 챕터에는 힌트가 없어요.')+'</p>';
  sa.appendChild(hp);
  if(ST.hintOpen)hp.classList.add('open');
  // Puzzle
  if(ch.puz){
    const pa=document.createElement('div');pa.className='puz-area';
    pa.innerHTML='<div class="puz-ttl">'+(ch.puz.ttl||'')+'</div><div class="puz-dsc">'+(ch.puz.dsc||'').replace(/\n/g,'<br>')+'</div>';
    P.build(ch.puz,pa,id);
    sa.appendChild(pa);
  } else {
    const nb=document.createElement('button');nb.className='btn btn-main';
    nb.style.marginTop='28px';
    nb.textContent=id<CHS.length-1?'계속 →':'끝';
    nb.onclick=()=>G.next(id);
    sa.appendChild(nb);
  }
  sa.scrollTop=0;
},
next(id){if(id+1<CHS.length)this.render(id+1);},
toggleHint(){
  ST.hintOpen=!ST.hintOpen;
  const hp=document.getElementById('hint-panel');
  if(hp)hp.classList.toggle('open',ST.hintOpen);
},
toggleBGM(){
  if(!bgmCtx)getBgmCtx();
  bgmOn=!bgmOn;ST.bgmOn=bgmOn;
  const bb=document.getElementById('bgm-btn');
  bb.textContent=bgmOn?'🔊':'🎵';
  bb.title=bgmOn?'BGM 끄기':'BGM 켜기';
  if(bgmOn){
    if(bgmCtx.state==='suspended')bgmCtx.resume();
    loopBGM();
  } else {
    if(bgmTimer)clearTimeout(bgmTimer);
    if(bgmCtx)bgmCtx.suspend();
  }
},
showEnding(idx){
  ST.endIdx=idx;save();
  document.getElementById('gs').classList.remove('on');
  const es=document.getElementById('es');es.classList.add('on');
  const e=ENDS[idx];
  document.getElementById('ei').textContent=e.icon;
  document.getElementById('ett').textContent=e.ttl;
  document.getElementById('eb').textContent=e.body;
  document.getElementById('ep-sep').style.display='none';
  document.getElementById('epb').textContent='';
},
showEpilogue(){
  const e=ENDS[ST.endIdx];
  document.getElementById('ep-sep').style.display='block';
  document.getElementById('epb').textContent=e.epilogue;
  document.querySelector('#es .end-actions .btn-gold').style.display='none';
  document.getElementById('epb').scrollIntoView({behavior:'smooth'});
},
};

// ═══════════════════════════════════════════════
// PUZZLE BUILDER
// ═══════════════════════════════════════════════
const P={
build(p,c,cid){
  const w=document.createElement('div');w.style.paddingTop='4px';
  const t=p.type;
  if(t==='code4')this.code4(p,w,cid);
  else if(t==='memory')this.memory(p,w,cid);
  else if(t==='order')this.order(p,w,cid);
  else if(t==='text')this.txt(p,w,cid);
  else if(t==='tapseq')this.tapseq(p,w,cid);
  else if(t==='simon')this.simon(p,w,cid);
  else if(t==='wordsearch')this.ws(p,w,cid);
  else if(t==='blanks')this.blanks(p,w,cid);
  else if(t==='drag')this.drag(p,w,cid);
  else if(t==='timer')this.timer(p,w,cid);
  else if(t==='ending')this.ending(p,w);
  c.appendChild(w);
},
fb(){const d=document.createElement('div');d.className='fb';return d;},
sfb(f,ok,m){
  f.className='fb show '+(ok?'ok':'no');f.textContent=m;
  if(ok){const pa=f.closest('.puz-area');if(pa){pa.classList.add('correct');setTimeout(()=>pa.classList.remove('correct'),900);}}
},

code4(p,w,cid){
  const row=document.createElement('div');row.className='num-row';
  const ins=[];
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');inp.type='number';inp.className='dgt';
    inp.min=0;inp.max=9;inp.inputMode='numeric';
    inp.addEventListener('input',()=>{inp.value=inp.value.slice(-1);if(inp.value&&i<3)ins[i+1].focus();});
    ins.push(inp);row.appendChild(inp);
  }
  const fb=this.fb();
  const btn=document.createElement('button');btn.className='btn btn-main';btn.textContent='확인';btn.style.marginTop='14px';
  btn.onclick=()=>{
    const v=ins.map(x=>x.value).join('');
    if(v===p.ans){this.sfb(fb,true,'✓ 정확해요!');setTimeout(()=>G.next(cid),1100);}
    else{this.sfb(fb,false,'틀렸어요. 다시 생각해봐요.');}
  };
  w.appendChild(row);w.appendChild(btn);w.appendChild(fb);
},

memory(p,w,cid){
  const pairs=[...p.pairs,...p.pairs];pairs.sort(()=>Math.random()-.5);
  const g=document.createElement('div');g.className='mem-grid';
  let fl=[],mat=0,lk=false;
  pairs.forEach(em=>{
    const c=document.createElement('div');c.className='mem-card';
    const inner=document.createElement('div');inner.className='mem-inner';c.appendChild(inner);
    c.addEventListener('click',()=>{
      if(lk||c.classList.contains('mat')||c.classList.contains('flp'))return;
      c.classList.add('flp');inner.textContent=em;fl.push({c,v:em});
      if(fl.length===2){lk=true;
        setTimeout(()=>{
          if(fl[0].v===fl[1].v){fl.forEach(f=>f.c.classList.replace('flp','mat'));mat++;if(mat===p.pairs.length)setTimeout(()=>G.next(cid),900);}
          else fl.forEach(f=>{f.c.classList.remove('flp');f.c.querySelector('.mem-inner').textContent='';});
          fl=[];lk=false;
        },750);
      }
    });
    g.appendChild(c);
  });
  const info=document.createElement('div');info.style.cssText='text-align:center;font-size:.78rem;color:var(--gray);margin-top:8px;';
  info.textContent='0 / '+p.pairs.length+' 완료';
  const origMat=mat;
  const obs=new MutationObserver(()=>{
    const m=g.querySelectorAll('.mat').length/2;
    info.textContent=m+' / '+p.pairs.length+' 완료';
  });
  obs.observe(g,{subtree:true,attributeFilter:['class']});
  w.appendChild(g);w.appendChild(info);
},

order(p,w,cid){
  let sel=[];
  const sr=document.createElement('div');sr.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:44px;';
  const fb=this.fb();
  const cg=document.createElement('div');cg.className='c-grid';
  p.items.forEach((it,i)=>{
    const b=document.createElement('button');b.className='c-btn';b.textContent=it;
    b.onclick=()=>{
      if(sel.includes(i))return;sel.push(i);b.style.opacity='.4';
      const t=document.createElement('span');
      t.style.cssText='background:var(--soft);border-radius:8px;padding:5px 10px;font-size:.82rem;color:var(--rose);white-space:nowrap;';
      t.textContent=sel.length+'. '+it.slice(0,5);sr.appendChild(t);
      if(sel.length===p.items.length){
        if(p.ans.every((v,i)=>v===sel[i])){this.sfb(fb,true,'✓ 완벽해요!');setTimeout(()=>G.next(cid),1100);}
        else{this.sfb(fb,false,'순서가 틀렸어요. 다시!');
          setTimeout(()=>{sel=[];sr.innerHTML='';fb.className='fb';cg.querySelectorAll('.c-btn').forEach(b=>b.style.opacity='1');},1300);}
      }
    };
    cg.appendChild(b);
  });
  w.appendChild(sr);w.appendChild(cg);w.appendChild(fb);
},

txt(p,w,cid){
  const inp=document.createElement('input');inp.type='text';inp.className='txt-inp';inp.placeholder='여기에 입력...';
  const fb=this.fb();
  const btn=document.createElement('button');btn.className='btn btn-main';btn.textContent='확인';btn.style.marginTop='13px';
  btn.onclick=()=>{
    const v=inp.value.trim().replace(/\s/g,'');
    const ans=(p.ans||'').replace(/\s/g,'');
    if(v===ans){this.sfb(fb,true,'✓ 맞아요!');setTimeout(()=>G.next(cid),1100);}
    else this.sfb(fb,false,'다시 생각해봐요.');
  };
  inp.addEventListener('keydown',e=>e.key==='Enter'&&btn.click());
  w.appendChild(inp);w.appendChild(btn);w.appendChild(fb);
},

tapseq(p,w,cid){
  const lbl=document.createElement('div');lbl.style.cssText='text-align:center;font-size:.82rem;color:var(--gray);margin-bottom:12px;';
  lbl.textContent='순서대로 탭하세요';
  const ta=document.createElement('div');ta.className='tap-area';
  const prog=document.createElement('div');prog.style.cssText='text-align:center;font-size:.8rem;color:var(--rose);margin-bottom:8px;';
  prog.textContent='0 / '+p.seq.length;
  const fb=this.fb();let idx=0;
  p.ems.forEach((em,i)=>{
    const b=document.createElement('button');b.className='tap-btn';b.textContent=em;
    b.onclick=()=>{
      const expIdx=p.ems.indexOf(p.seq[idx]);
      if(i===expIdx){
        b.style.background='var(--rose)';b.style.color='#fff';
        setTimeout(()=>{b.style.background='';b.style.color='';},400);
        idx++;prog.textContent=idx+' / '+p.seq.length;
        if(idx===p.seq.length){this.sfb(fb,true,'✓ 완료!');setTimeout(()=>G.next(cid),1100);}
      } else {
        this.sfb(fb,false,'틀렸어요! 처음부터.');
        setTimeout(()=>{idx=0;prog.textContent='0 / '+p.seq.length;fb.className='fb';},1200);
      }
    };
    ta.appendChild(b);
  });
  w.appendChild(prog);w.appendChild(lbl);w.appendChild(ta);w.appendChild(fb);
},

simon(p,w,cid){
  const bs=[];
  const sg=document.createElement('div');sg.className='simon-grid';
  const fb=this.fb();let ps=[],show=false;
  const prog=document.createElement('div');prog.style.cssText='text-align:center;font-size:.8rem;color:var(--rose);margin-bottom:10px;';
  prog.textContent='0 / '+p.seq.length;
  p.lbls.forEach((lb,i)=>{
    const b=document.createElement('button');b.className='s-btn';b.textContent=lb;
    b.onclick=()=>{
      if(show)return;ps.push(i);const ci=ps.length-1;
      if(ps[ci]!==p.seq[ci]){
        this.sfb(fb,false,'틀렸어요! 다시 패턴을 보세요.');
        setTimeout(()=>{ps=[];prog.textContent='0 / '+p.seq.length;fb.className='fb';go();},1400);return;
      }
      prog.textContent=ps.length+' / '+p.seq.length;
      if(ps.length===p.seq.length){this.sfb(fb,true,'✓ 기억했어요!');setTimeout(()=>G.next(cid),1100);}
    };
    bs.push(b);sg.appendChild(b);
  });
  const sb=document.createElement('button');sb.className='btn btn-sec';sb.textContent='▶ 패턴 보기';sb.style.marginBottom='12px';sb.onclick=go;
  function go(){show=true;ps=[];prog.textContent='0 / '+p.seq.length;let i=0;
    const iv=setInterval(()=>{
      if(i>0)bs[p.seq[i-1]].style.background='';
      if(i===p.seq.length){clearInterval(iv);show=false;return;}
      bs[p.seq[i]].style.background='var(--rose)';i++;
    },750);
  }
  w.appendChild(prog);w.appendChild(sb);w.appendChild(sg);w.appendChild(fb);
},

ws(p,w,cid){
  const fb=this.fb();
  let found=new Set();
  // Build interactive grid
  if(p.grid){
    const info=document.createElement('div');
    info.style.cssText='text-align:center;font-size:.8rem;color:var(--gray);margin-bottom:10px;';
    info.textContent='격자에서 단어의 첫 글자를 탭하세요 ('+p.ans.length+'개)';
    w.appendChild(info);
    const gridWrap=document.createElement('div');
    gridWrap.style.cssText='overflow-x:auto;margin-bottom:16px;';
    const tbl=document.createElement('table');
    tbl.style.cssText='border-collapse:separate;border-spacing:4px;margin:0 auto;';
    const cellMap={};
    // Build start-cell → word map
    const startMap={};
    Object.entries(p.highlight).forEach(([word,cells])=>{
      const [r,c]=cells[0];
      startMap[r+','+c]=word;
    });
    p.grid.forEach((row,ri)=>{
      const tr=document.createElement('tr');
      row.forEach((cell,ci)=>{
        const td=document.createElement('td');
        td.textContent=cell;
        const isStart=startMap[ri+','+ci];
        td.style.cssText='width:36px;height:36px;text-align:center;vertical-align:middle;background:var(--soft);border-radius:8px;font-size:0.9rem;color:var(--text);transition:background .3s,color .3s;cursor:'+(isStart?'pointer':'default')+';user-select:none;'+(isStart?'border:2px dashed #f2a7bb;':'');
        if(isStart){
          td.onclick=()=>{
            const word=startMap[ri+','+ci];
            const wordIdx=p.choices.indexOf(word);
            if(found.has(wordIdx))return;
            found.add(wordIdx);
            // Highlight all cells of this word
            p.highlight[word].forEach(([wr,wc])=>{
              const wt=cellMap[wr]&&cellMap[wr][wc];
              if(wt){wt.style.background='var(--rose)';wt.style.color='#fff';wt.style.fontWeight='700';wt.style.border='none';}
            });
            // Also visually mark in choices
            if(p.ans.includes(wordIdx)){
              info.textContent='찾은 단어: '+found.size+' / '+p.ans.length;
              if(found.size===p.ans.length){this.sfb(fb,true,'✓ 전부 찾았어요!');setTimeout(()=>G.next(cid),1100);}
            }
          };
        }
        if(!cellMap[ri])cellMap[ri]={};
        cellMap[ri][ci]=td;
        tr.appendChild(td);
      });
      tbl.appendChild(tr);
    });
    gridWrap.appendChild(tbl);
    w.appendChild(gridWrap);
  }
  // Backup choice buttons (hint mode)
  const hint2=document.createElement('div');hint2.style.cssText='text-align:center;font-size:.78rem;color:var(--pink);margin:6px 0 10px;cursor:pointer;';
  hint2.textContent='힌트: 단어 목록 보기 ▼';
  const cg=document.createElement('div');cg.className='c-grid';cg.style.display='none';
  hint2.onclick=()=>{cg.style.display=cg.style.display==='none'?'flex':'none';};
  const isMulti=p.multi;
  p.choices.forEach((ch,i)=>{
    const b=document.createElement('button');b.className='c-btn';b.textContent=ch;
    b.onclick=()=>{
      const correct=isMulti?p.ans.includes(i):(i===p.ans);
      if(correct&&!found.has(i)){
        b.classList.add('ok');b.onclick=null;found.add(i);
        if(p.highlight&&p.highlight[ch]){
          p.highlight[ch].forEach(([ri,ci])=>{
            const pg=w.querySelector('table');
            if(pg){const rows=pg.querySelectorAll('tr');const td=rows[ri]?.querySelectorAll('td')[ci];if(td){td.style.background='var(--rose)';td.style.color='#fff';td.style.fontWeight='700';}}
          });
        }
        if(isMulti){if(found.size===p.ans.length){this.sfb(fb,true,'✓ 전부 찾았어요!');setTimeout(()=>G.next(cid),1100);}}
        else{this.sfb(fb,true,'✓ 맞아요!');setTimeout(()=>G.next(cid),1100);}
      } else if(!correct){
        b.classList.add('no');this.sfb(fb,false,'아니에요.');
        setTimeout(()=>{b.classList.remove('no');fb.className='fb';},900);
      }
    };
    cg.appendChild(b);
  });
  w.appendChild(hint2);w.appendChild(cg);w.appendChild(fb);
},

blanks(p,w,cid){
  const fb=this.fb();let ans=new Array(p.blanks.length).fill(null);
  p.blanks.forEach((bl,bi)=>{
    const ql=document.createElement('div');ql.style.cssText='font-size:.88rem;color:var(--text);margin:14px 0 8px;font-weight:700;';ql.textContent=bl.q;
    w.appendChild(ql);
    const cg=document.createElement('div');cg.className='c-grid';
    bl.cs.forEach((ch,ci)=>{
      const b=document.createElement('button');b.className='c-btn';b.textContent=ch;
      b.onclick=()=>{
        cg.querySelectorAll('.c-btn').forEach(x=>x.classList.remove('ok','no'));
        if(ci===bl.a){b.classList.add('ok');ans[bi]=ci;}else{b.classList.add('no');ans[bi]=null;}
        if(ans.every((a,i)=>a===p.blanks[i].a)){this.sfb(fb,true,'✓ 편지가 완성됐어요!');setTimeout(()=>G.next(cid),1100);}
      };
      cg.appendChild(b);
    });
    w.appendChild(cg);
  });
  w.appendChild(fb);
},

drag(p,w,cid){
  const items=[...p.items];const shuffled=[...items].sort(()=>Math.random()-.5);
  const fb=this.fb();
  let selected=null;
  let slotContents=new Array(p.items.length).fill(null);
  const srcDiv=document.createElement('div');srcDiv.className='drag-src';
  const slotDiv=document.createElement('div');slotDiv.className='drag-slots';
  const itemEls=[],slotEls=[];
  shuffled.forEach((it,si)=>{
    const b=document.createElement('div');b.className='drag-item';b.textContent=it;b.dataset.orig=items.indexOf(it);
    b.onclick=()=>{
      if(b.classList.contains('placed'))return;
      if(selected===b){selected=null;b.classList.remove('selected');return;}
      srcDiv.querySelectorAll('.drag-item').forEach(x=>x.classList.remove('selected'));
      selected=b;b.classList.add('selected');
    };
    itemEls.push(b);srcDiv.appendChild(b);
  });
  for(let i=0;i<p.items.length;i++){
    const slot=document.createElement('div');slot.className='drag-slot';
    const num=document.createElement('span');num.className='slot-num';num.textContent=(i+1)+'.';
    const txt=document.createElement('span');txt.textContent='여기에 놓기';txt.className='slot-txt';
    slot.appendChild(num);slot.appendChild(txt);
    slot.dataset.idx=i;
    slot.onclick=()=>{
      if(selected){
        // Place selected into this slot
        const prev=slotContents[i];
        if(prev!==null){
          // Return prev to source
          itemEls.find(el=>el.dataset.orig==prev).classList.remove('placed');
        }
        const origIdx=parseInt(selected.dataset.orig);
        // Remove from any current slot
        slotContents.forEach((v,si)=>{if(v===origIdx){slotContents[si]=null;slotEls[si].querySelector('.slot-txt').textContent='여기에 놓기';slotEls[si].classList.remove('filled');}});
        slotContents[i]=origIdx;
        slot.querySelector('.slot-txt').textContent=items[origIdx];
        slot.classList.add('filled');
        selected.classList.add('placed');
        selected.classList.remove('selected');
        selected=null;
        // Check
        if(slotContents.every((v,i)=>v===p.ans[i])){
          this.sfb(fb,true,'✓ 완성됐어요!');setTimeout(()=>G.next(cid),1100);
        }
      } else if(slot.classList.contains('filled')){
        // Return to source
        const origIdx=slotContents[i];
        itemEls.find(el=>el.dataset.orig==origIdx).classList.remove('placed');
        slotContents[i]=null;slot.querySelector('.slot-txt').textContent='여기에 놓기';slot.classList.remove('filled');
      }
    };
    slotEls.push(slot);slotDiv.appendChild(slot);
  }
  const info=document.createElement('div');info.style.cssText='text-align:center;font-size:.8rem;color:var(--gray);margin-bottom:12px;';
  info.textContent='항목을 탭해 선택 → 슬롯을 탭해 배치';
  w.appendChild(info);w.appendChild(srcDiv);
  const arrow=document.createElement('div');arrow.style.cssText='text-align:center;color:var(--pink);margin:8px 0;font-size:1.2rem;';arrow.textContent='↓';
  w.appendChild(arrow);w.appendChild(slotDiv);w.appendChild(fb);
},

timer(p,w,cid){
  const timerWrap=document.createElement('div');timerWrap.className='timer-wrap';
  const barBg=document.createElement('div');barBg.className='timer-bar-bg';
  const bar=document.createElement('div');bar.className='timer-bar';bar.style.width='100%';
  barBg.appendChild(bar);
  const num=document.createElement('div');num.className='timer-num';num.textContent=p.sec+'초';
  timerWrap.appendChild(barBg);timerWrap.appendChild(num);
  const row=document.createElement('div');row.className='num-row';
  const ins=[];
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');inp.type='number';inp.className='dgt';inp.min=0;inp.max=9;inp.inputMode='numeric';
    inp.addEventListener('input',()=>{inp.value=inp.value.slice(-1);if(inp.value&&i<3)ins[i+1].focus();});
    ins.push(inp);row.appendChild(inp);
  }
  const fb=this.fb();
  const btn=document.createElement('button');btn.className='btn btn-main';btn.textContent='확인';btn.style.marginTop='14px';
  let remaining=p.sec,tiv=null;
  function startTimer(){
    tiv=setInterval(()=>{
      remaining--;
      const pct=Math.max(0,(remaining/p.sec)*100);
      bar.style.width=pct+'%';
      if(remaining<=10){bar.classList.add('urgent');num.classList.add('urgent');}
      num.textContent=remaining+'초';
      if(remaining<=0){
        clearInterval(tiv);
        fb.className='fb show no';
        fb.textContent='시간 초과! 힌트: '+p.hint;
        remaining=p.sec;bar.style.width='100%';bar.style.background='';num.textContent=p.sec+'초';
        setTimeout(()=>{fb.className='fb';startTimer();},3000);
      }
    },1000);
  }
  startTimer();
  btn.onclick=()=>{
    const v=ins.map(x=>x.value).join('');
    if(v===p.ans){clearInterval(tiv);this.sfb(fb,true,'✓ 시간 안에 풀었어요!');setTimeout(()=>G.next(cid),1100);}
    else this.sfb(fb,false,'틀렸어요. 계속 도전!');
  };
  ins.forEach(inp=>inp.addEventListener('keydown',e=>e.key==='Enter'&&btn.click()));
  w.appendChild(timerWrap);w.appendChild(row);w.appendChild(btn);w.appendChild(fb);
},

ending(p,w){
  const cg=document.createElement('div');cg.className='c-grid';
  p.cs.forEach((ch,i)=>{
    const b=document.createElement('button');b.className='c-btn';
    b.style.cssText='padding:20px 16px;font-size:.95rem;text-align:center;line-height:1.6;';
    b.textContent=ch;b.onclick=()=>G.showEnding(i);cg.appendChild(b);
  });
  const note=document.createElement('div');note.style.cssText='text-align:center;font-size:.78rem;color:var(--gray);margin-top:12px;';
  note.textContent='정답 없음 — 당신의 마음이 정답입니다';
  w.appendChild(cg);w.appendChild(note);
},
