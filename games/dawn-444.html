<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>새벽 4시 44분 — 감성 심리 방탈출</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07070f;--panel:#101020;--panel2:#171730;--line:#26264a;
  --txt:#d8d8ea;--dim:#8a8aa8;--accent:#8fb4ff;--accent2:#5a7fd6;
  --gold:#ffc46b;--warm:#ffb85c;--ok:#7fd8a5;--bad:#e88a8a;
  --font:'Noto Serif KR','Georgia',serif;
}
html,body{height:100%;background:var(--bg);}
body{font-family:var(--font);color:var(--txt);overflow-x:hidden;transition:background 1.2s;}

/* ── 분위기 레이어 (파티클/비네트) ── */
#amb{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
#amb::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%,transparent 40%,rgba(0,0,0,.5) 100%);}
body.end #amb::after{background:none;}
#amb .p{position:absolute;bottom:-12px;border-radius:50%;
  background:var(--pcol,#5a7fd6);opacity:0;
  animation:floatUp linear infinite;}
@keyframes floatUp{
  0%{transform:translateY(0);opacity:0}
  12%{opacity:.35}
  85%{opacity:.2}
  100%{transform:translateY(-108vh);opacity:0}}
#app{z-index:2;}
body.ch2{background:#0a0a16;}
body.ch3{background:#0c0d1c;}
body.ch4{background:#141020;}
body.ch5{background:#1a1430;}
body.end{background:linear-gradient(180deg,#2a2050 0%,#4a3670 40%,#b86a6a 75%,#ffb85c 100%);background-attachment:fixed;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}

/* ── TITLE ── */
#ts{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 30px;text-align:center;}
#ts .clock{font-size:3.4rem;letter-spacing:4px;color:var(--accent);
  text-shadow:0 0 30px rgba(143,180,255,.45);margin-bottom:14px;
  animation:pulse 4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
#ts h1{font-size:1.7rem;letter-spacing:1px;margin-bottom:12px;color:#eaeefc;}
#ts .sub{font-size:.85rem;color:var(--dim);line-height:2;margin-bottom:40px;}
#ts .meta{font-size:.74rem;color:#55557a;margin-top:26px;line-height:1.9;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;
  font-family:var(--font);font-size:.95rem;cursor:pointer;transition:transform .12s,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn-main{background:linear-gradient(135deg,#3a4f8a,#5a7fd6);color:#fff;
  box-shadow:0 4px 24px rgba(90,127,214,.35);}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--line);margin-top:11px;}
.btn-gold{background:linear-gradient(135deg,#c98a3a,#ffc46b);color:#241505;font-weight:700;}
.btn-sm{width:auto;display:inline-block;padding:10px 18px;font-size:.84rem;border-radius:11px;}

/* ── GAME ── */
#gs{display:none;flex-direction:column;min-height:100vh;}
#gs.on{display:flex;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:11px 14px;background:rgba(10,10,22,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;}
.tb-ch{font-size:.68rem;color:var(--dim);letter-spacing:.5px;}
.tb-ttl{font-size:.86rem;color:var(--accent);font-weight:700;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-timer{font-size:.8rem;color:var(--gold);letter-spacing:1px;min-width:52px;text-align:right;}
.tb-timer.low{color:#ff8585;animation:tblink 1s step-end infinite;}
@keyframes tblink{50%{opacity:.35}}
.tb-btn{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:6px 11px;font-size:.76rem;color:var(--txt);cursor:pointer;font-family:var(--font);}
.prog-wrap{background:#1a1a30;height:3px;}
.prog-bar{height:3px;background:linear-gradient(90deg,var(--accent2),var(--gold));
  transition:width .6s;width:0%;}

#stage{flex:1;padding:24px 20px 60px;}
#stage.fade{animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.scene-icon{width:100%;height:130px;border-radius:16px;background:var(--panel);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-size:3.4rem;margin-bottom:20px;}
.stx{font-size:.92rem;line-height:2.05;color:var(--txt);margin-bottom:16px;}
.stx em{color:var(--gold);font-style:normal;}
.stx .q{color:var(--accent);font-style:italic;}
.wall{background:var(--panel);border-left:3px solid var(--accent2);border-radius:0 12px 12px 0;
  padding:15px 16px;margin:14px 0;font-size:.88rem;line-height:1.95;color:#c6d2f2;font-style:italic;}

/* ── CHAPTER CARD ── */
.chap{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.chap .n{font-size:.78rem;color:var(--dim);letter-spacing:3px;margin-bottom:14px;}
.chap h2{font-size:1.5rem;color:#eaeefc;margin-bottom:10px;}
.chap .d{font-size:.85rem;color:var(--dim);line-height:2;margin-bottom:30px;}
.door-letter{width:92px;height:92px;border:2px solid var(--gold);border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:2.6rem;color:var(--gold);
  margin:0 auto 14px;box-shadow:0 0 34px rgba(255,196,107,.25);animation:glowL 2.5s ease-in-out infinite;}
@keyframes glowL{0%,100%{box-shadow:0 0 18px rgba(255,196,107,.18)}50%{box-shadow:0 0 40px rgba(255,196,107,.4)}}
.door-cap{font-size:.8rem;color:var(--dim);margin-bottom:28px;}

/* ── PUZZLE ── */
.puz{background:var(--panel);border:1px solid var(--line);border-radius:18px;
  padding:20px 17px;margin:16px 0;}
.puz.shake{animation:shk .4s;}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.puz.correct{animation:cg .9s ease;}
@keyframes cg{0%{box-shadow:none}50%{box-shadow:0 0 30px rgba(127,216,165,.4)}100%{box-shadow:none}}
.puz-no{font-size:.7rem;color:var(--gold);letter-spacing:1.5px;text-align:center;margin-bottom:8px;}
.puz-ttl{font-size:1.02rem;color:#eaeefc;text-align:center;margin-bottom:12px;font-weight:700;}
.puz-dsc{font-size:.86rem;color:var(--dim);line-height:1.9;margin-bottom:16px;text-align:center;}
.feedback{min-height:22px;text-align:center;font-size:.82rem;margin-top:10px;}
.feedback.ok{color:var(--ok);} .feedback.no{color:var(--bad);}

.num-row{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.dgt{width:52px;height:64px;border:2px solid var(--line);border-radius:12px;font-size:1.5rem;
  text-align:center;background:var(--panel2);color:var(--accent);font-family:var(--font);outline:none;}
.dgt:focus{border-color:var(--accent2);}
.txt-in{width:100%;padding:14px;border:2px solid var(--line);border-radius:12px;
  background:var(--panel2);color:var(--txt);font-family:var(--font);font-size:.95rem;
  outline:none;margin-bottom:13px;text-align:center;}
.txt-in:focus{border-color:var(--accent2);}
textarea.txt-in{text-align:left;min-height:90px;resize:none;line-height:1.8;}

.msg-list{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.msg{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;
  font-size:.82rem;line-height:1.7;}
.msg .t{color:var(--gold);font-size:.72rem;margin-bottom:3px;}
.msg b{color:var(--accent);}

.ord-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.ord-btn{padding:13px 14px;border:2px solid var(--line);border-radius:12px;background:var(--panel2);
  font-family:var(--font);font-size:.86rem;color:var(--txt);cursor:pointer;text-align:left;
  transition:all .15s;line-height:1.6;display:flex;align-items:center;gap:11px;}
.ord-btn .ico{font-size:1.4rem;}
.ord-btn .sub{display:block;font-size:.72rem;color:var(--dim);margin-top:2px;}
.ord-btn.sel{border-color:var(--gold);background:#1f1a2e;}
.ord-btn .badge{margin-left:auto;min-width:26px;height:26px;border-radius:50%;background:var(--gold);
  color:#241505;font-size:.8rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
.ord-tools{display:flex;gap:9px;}

.tile-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px;}
.tile{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;
  transition:background .15s;color:var(--dim);}
.tile:active{background:#22224a;}
.tile.mark{font-size:.62rem;color:var(--gold);}
.tile-cap{font-size:.74rem;color:var(--dim);text-align:center;margin-bottom:12px;line-height:1.8;}

.scale-zone{display:flex;gap:10px;margin-bottom:13px;}
.pan{flex:1;border:2px dashed var(--line);border-radius:13px;min-height:104px;padding:9px;
  display:flex;flex-direction:column;gap:6px;}
.pan h4{font-size:.72rem;color:var(--dim);text-align:center;font-weight:400;}
.pan .sum{font-size:.78rem;color:var(--gold);text-align:center;margin-top:auto;}
.wchip{display:inline-block;padding:8px 12px;border-radius:20px;border:1px solid var(--line);
  background:var(--panel2);font-size:.8rem;color:var(--txt);cursor:pointer;margin:3px;}
.wchip.L{border-color:var(--bad);} .wchip.R{border-color:var(--ok);}
.wpool{text-align:center;margin-bottom:12px;}

.star-box{position:relative;width:100%;height:260px;background:#04040c;border-radius:16px;
  border:1px solid var(--line);margin-bottom:13px;overflow:hidden;}
.star{position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#cfd8ff;}
.star .dot{width:8px;height:8px;border-radius:50%;background:#cfd8ff;box-shadow:0 0 8px #8fb4ff;}
.star.dim .dot{width:5px;height:5px;opacity:.5;box-shadow:none;}
.star.lit .dot{background:var(--gold);box-shadow:0 0 14px var(--gold);width:10px;height:10px;}
.star .rk{position:absolute;top:-4px;right:-2px;font-size:.62rem;color:var(--gold);}
#starSvg{position:absolute;inset:0;pointer-events:none;}
#starSvg line{stroke:#ffc46b;stroke-width:1.5;opacity:.8;}

.table-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;
  gap:9px;margin-bottom:13px;align-items:center;justify-items:center;}
.seat{width:100%;padding:13px 6px;border:2px solid var(--line);border-radius:12px;background:var(--panel2);
  font-family:var(--font);font-size:.84rem;color:var(--txt);cursor:pointer;text-align:center;}
.seat.set{border-color:var(--gold);color:var(--gold);}
.tbl{width:100%;aspect-ratio:1.4;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.door-mark{font-size:.72rem;color:var(--dim);text-align:center;}

.hint-modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:60;display:none;
  align-items:flex-end;justify-content:center;}
.hint-modal.on{display:flex;}
.hint-card{width:100%;max-width:480px;background:var(--panel);border-radius:22px 22px 0 0;
  padding:24px 22px 34px;border-top:1px solid var(--line);}
.hint-card h3{font-size:.95rem;color:var(--gold);margin-bottom:14px;text-align:center;}
.hint-item{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;margin-bottom:10px;font-size:.85rem;line-height:1.8;color:var(--txt);}
.hint-lock{width:100%;padding:13px;border:1px dashed var(--line);border-radius:12px;background:transparent;
  color:var(--dim);font-family:var(--font);font-size:.83rem;cursor:pointer;margin-bottom:10px;}

/* ── ENDING ── */
.end-wrap{min-height:86vh;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:20px 4px;}
.end-wrap .sun{font-size:3.6rem;margin-bottom:22px;animation:rise 3s ease;}
@keyframes rise{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.end-nar{font-size:.95rem;line-height:2.3;color:#fff8ee;text-shadow:0 1px 10px rgba(0,0,0,.3);margin-bottom:26px;}
.end-nar em{color:#fff;font-style:normal;font-weight:700;}
.mycard{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);border-radius:16px;
  backdrop-filter:blur(6px);padding:20px 18px;margin-bottom:22px;}
.mycard .cap{font-size:.72rem;color:#ffe8c8;letter-spacing:1px;margin-bottom:9px;}
.mycard .words{font-size:1.05rem;color:#fff;line-height:1.9;}
.end-stats{font-size:.8rem;color:#ffe8c8;line-height:2;margin-bottom:26px;}
</style>
</head>
<body>
<div id="amb"></div>
<div id="app">

  <!-- 타이틀 -->
  <section id="ts">
    <div class="clock">4:44</div>
    <h1>새벽 4시 44분</h1>
    <p class="sub">눈을 떴을 때, 방에서 창문이 사라져 있었다.<br>
    문은 아무리 밀어도 열리지 않는다.<br>
    여기는 — 내가 만든 방이다.</p>
    <button class="btn btn-main" onclick="startGame()">눈을 뜬다</button>
    <p class="meta">감성 심리극 방탈출 · 20문제 · <b style="color:#8fb4ff">제한 시간 60분</b><br>해가 뜨기 전에 방을 나가야 한다.<br>힌트 3단계 제공 (사용해도 페널티 없음)</p>
  </section>

  <!-- 게임 -->
  <section id="gs">
    <div class="topbar">
      <div>
        <div class="tb-ch" id="tbCh">PROLOGUE</div>
        <div class="tb-ttl" id="tbTtl">새벽 4시 44분</div>
      </div>
      <div class="tb-right">
        <div class="tb-timer" id="tbTimer">00:00</div>
        <button class="tb-btn" id="tbLetters" onclick="showLetters()">단서</button>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
    <div id="stage"></div>
  </section>

  <!-- 힌트 모달 -->
  <div class="hint-modal" id="hintModal" onclick="if(event.target===this)closeHint()">
    <div class="hint-card">
      <h3 id="hintTtl">힌트</h3>
      <div id="hintBody"></div>
      <button class="btn btn-ghost" onclick="closeHint()">닫기</button>
    </div>
  </div>

</div>
<script>
/* ============================================================
   새벽 4시 44분 — 감성 심리 방탈출 (20문제 / 5챕터)
   룸메이커 플랫폼용 단일 파일 게임
============================================================ */

var CH_INFO = {
  0:{lbl:'PROLOGUE', ttl:'새벽 4시 44분', cls:''},
  1:{lbl:'CHAPTER 1', ttl:'어둠의 방', cls:''},
  2:{lbl:'CHAPTER 2', ttl:'기억의 복도', cls:'ch2'},
  3:{lbl:'CHAPTER 3', ttl:'거울의 방', cls:'ch3'},
  4:{lbl:'CHAPTER 4', ttl:'연결의 방', cls:'ch4'},
  5:{lbl:'CHAPTER 5', ttl:'새벽의 문', cls:'ch5'}
};

var SCENES = [

/* ───────── 프롤로그 ───────── */
{type:'story', ch:0, icon:'🌑', text:[
 '새벽 4시 44분. 알람이 아닌 <em>정적</em>에 잠이 깼다.',
 '창문이 있던 자리엔 벽지만 있다. 휴대폰은 먹통. 방문 손잡이를 잡고 <em>민다</em>. 꿈쩍도 하지 않는다. 다시 민다. 어깨로 민다. 열리지 않는다.',
 '그때, 책상 위 스탠드가 혼자 켜진다. 벽에 글씨가 보인다. 내 글씨가 아닌, 내 글씨로.'
], wall:'"여기는 네가 만든 방이야.<br>나가는 길도 네가 만들 수 있어."', btn:'방을 둘러본다'},

{type:'chapter', ch:1, icon:'🕯️', desc:'창문이 사라진 방.<br>스탠드 불빛 하나가 전부다.'},

/* ── P1 거울이 훔친 시간 ── */
{type:'puzzle', ch:1, no:1, ttl:'거울이 훔친 시간', icon:'🪞',
 pre:['벽시계는 손이 닿지 않는 높은 선반 위. 방 안에서는 오직 <em>거울을 통해서만</em> 시계가 보인다.','거울 속 시계는 <em>4시 44분</em>을 가리키고 있다. 거울 테두리에 문구가 새겨져 있다.'],
 wall:'"거울은 시간을 훔친다.<br>진짜 시간을 서랍에게 말해 줘."',
 dsc:'책상 서랍의 3자리 자물쇠를 열어라.',
 kind:'code', len:3, ans:'716',
 hints:['거울 속 세상은 우리와 좌우가 반대예요.','아날로그 시계를 거울에 비추면, 실제 시각은 12시를 기준으로 접은 시각이 됩니다.','12시에서 4시 44분을 빼 보세요. 시각 그대로 세 자리로.'],
 after:['철컥. 서랍이 열린다. 안에는 배터리 5%의 <em>낡은 휴대폰</em>이 들어 있다.','절망은 시간을 왜곡해서 보여준다. 지금 내가 보는 시간도, 진짜가 아닐지 모른다.']},

/* ── P2 일곱 통의 문자 ── */
{type:'puzzle', ch:1, no:2, ttl:'일곱 통의 문자', icon:'📱',
 pre:['휴대폰 수신함에 불합격 통보 문자 7통이 뒤섞여 있다. 지워지지 않는 기록들.'],
 msgs:[
  {t:'11:03',x:'<b>등</b>록해 주신 지원서는 검토되었으나 불합격입니다.'},
  {t:'17:31',x:'<b>있</b>는 그대로의 귀하는 저희와 맞지 않았습니다.'},
  {t:'09:12',x:'<b>빛</b>나는 재능에도 불구하고 귀하를 모시지 못하게 되었습니다.'},
  {t:'13:25',x:'<b>뒤</b>이어 진행될 전형에 귀하는 포함되지 않았습니다.'},
  {t:'19:58',x:'<b>다</b>음을 기약하겠습니다.'},
  {t:'10:40',x:'<b>은</b>행 채용 결과를 안내드립니다. 아쉽게도 다음 기회에…'},
  {t:'15:50',x:'<b>에</b>이치알(HR)팀입니다. 최종 불합격을 통보드립니다.'}],
 dsc:'문자들이 숨기고 있는 한 문장을 찾아 입력하라.',

/* ───────────────── 엔진 ───────────────── */
var LIMIT=3600; /* 제한 시간: 60분 */
var idx=0, solved=0, hintsUsed=0, letters=[], myWords='', t0=0, tmr=null, gameOver=false;
var $=function(id){return document.getElementById(id);};

function startGame(){
  $('ts').style.display='none';
  $('gs').classList.add('on');
  t0=Date.now();
  tmr=setInterval(tick,1000);
  spawnAmb();
  tick();
  render();
}
function tick(){
  if(gameOver)return;
  var s=Math.floor((Date.now()-t0)/1000), r=LIMIT-s;
  if(r<=0){ showFail(); return; }
  var e=$('tbTimer');
  e.textContent=String(Math.floor(r/60)).padStart(2,'0')+':'+String(r%60).padStart(2,'0');
  e.className='tb-timer'+(r<600?' low':'');
}
function elapsed(){
  var s=Math.min(Math.floor((Date.now()-t0)/1000),LIMIT);
  return Math.floor(s/60)+'분 '+(s%60)+'초';
}
function remainStr(){
  var r=Math.max(LIMIT-Math.floor((Date.now()-t0)/1000),0);
  return Math.floor(r/60)+'분 '+(r%60)+'초';
}

/* ── 분위기 파티클 ── */
var AMB_TINT={0:'#5a7fd6',1:'#5a7fd6',2:'#d4a853',3:'#9fb4ff',4:'#ffb85c',5:'#ffd9a0'};
function spawnAmb(){
  var a=$('amb');
  for(var i=0;i<22;i++){
    var p=document.createElement('span');
    p.className='p';
    var sz=(2+Math.random()*3.5).toFixed(1);
    p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.left=(Math.random()*100).toFixed(1)+'%';
    p.style.animationDuration=(14+Math.random()*18).toFixed(1)+'s';
    p.style.animationDelay=(-Math.random()*30).toFixed(1)+'s';
    a.appendChild(p);
  }
}
function ambTint(ch){
  document.documentElement.style.setProperty('--pcol',AMB_TINT[ch]||'#5a7fd6');
}
function norm(v){return (v||'').replace(/[\s.,!?'"“”‘’·\-—~]/g,'');}
function esc(v){return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function next(){ idx++; render(); }

function render(){
  var s=SCENES[idx];
  if(!s || gameOver){ return; }
  document.body.className=CH_INFO[s.ch].cls;
  ambTint(s.ch);
  $('tbCh').textContent=CH_INFO[s.ch].lbl;
  $('tbTtl').textContent=CH_INFO[s.ch].ttl;
  $('prog').style.width=(solved/20*100)+'%';
  var h='';
  if(s.type==='story'){
    h+='<div class="scene-icon">'+s.icon+'</div>';
    s.text.forEach(function(p){h+='<p class="stx">'+p+'</p>';});
    if(s.wall)h+='<div class="wall">'+s.wall+'</div>';
    h+='<button class="btn btn-main" onclick="next()">'+s.btn+'</button>';
  }
  else if(s.type==='chapter'){
    h+='<div class="chap"><div class="n">— '+CH_INFO[s.ch].lbl+' —</div>';
    h+='<div class="scene-icon" style="border:none;background:transparent;height:auto;font-size:3.6rem;margin-bottom:18px;">'+s.icon+'</div>';
    h+='<h2>'+CH_INFO[s.ch].ttl+'</h2><p class="d">'+s.desc+'</p>';
    h+='<button class="btn btn-main" onclick="chapterEnter()">들어간다</button></div>';
  }
  else if(s.type==='letter'){
    h+='<div class="chap"><p class="d">'+s.cap+'</p>';
    h+='<div class="door-letter">'+s.letter+'</div>';
    h+='<div class="door-cap">글자를 단서로 기록했다. (상단 [단서])</div>';
    h+='<button class="btn btn-main" onclick="takeLetter()">기억해 둔다</button></div>';
  }
  else if(s.type==='puzzle'){
    h+=puzzleHTML(s);
  }
  var st=$('stage');
  st.classList.remove('fade'); void st.offsetWidth;
  st.innerHTML=h; st.classList.add('fade');
  window.scrollTo(0,0);
  if(s.type==='puzzle') puzzleInit(s);
}
function chapterEnter(){
  var s=SCENES[idx];
  if(s.ch===5 && letters.indexOf('나')<0) letters.push('나');
  next();
}
function takeLetter(){
  var s=SCENES[idx];
  if(letters.indexOf(s.letter)<0) letters.push(s.letter);
  next();
}

/* ── 퍼즐 렌더링 ── */
function puzzleHTML(s){
  var h='<div class="scene-icon">'+s.icon+'</div>';
  (s.pre||[]).forEach(function(p){h+='<p class="stx">'+p+'</p>';});
  if(s.msgs){
    h+='<div class="msg-list">';
    s.msgs.forEach(function(m){h+='<div class="msg"><div class="t">'+m.t+'</div>'+m.x+'</div>';});
    h+='</div>';
  }
  if(s.wall)h+='<div class="wall">'+s.wall+'</div>';
  h+='<div class="puz" id="puz">';
  h+='<div class="puz-no">PUZZLE '+String(s.no).padStart(2,'0')+' / 20</div>';
  h+='<div class="puz-ttl">'+s.ttl+'</div>';
  h+='<div class="puz-dsc">'+s.dsc+'</div>';

  h+='<button class="btn btn-ghost" onclick="openHint()">🕯️ 힌트 보기</button>';

}

var ordSel=[], ordItems=[], seatMap={}, weightZone={}, starNext=1, starLit=[];
function puzzleInit(s){
  s._h=s._h||0;
  if(s.kind==='code'){
    for(var i=0;i<s.len;i++)(function(i){
      $('d'+i).addEventListener('input',function(){
        this.value=this.value.replace(/[^0-9]/g,'');
        if(this.value && i<s.len-1)$('d'+(i+1)).focus();
      });
    })(i);
    $('d0').focus();
  }
  else if(s.kind==='order'){
    ordSel=[];
    ordItems=s.items.map(function(it,i){return {i:i,it:it};});
    ordItems=ordItems.slice(2).concat(ordItems.slice(0,2)).reverse();
    drawOrder(s);
  }
  else if(s.kind==='tile'){
    var tg=$('tg'), marks={'1,1':'시소','4,1':'미끄럼','1,3':'그네'};
    for(var y=5;y>=1;y--)for(var x=1;x<=5;x++)(function(x,y){
      var d=document.createElement('div');
      d.className='tile'+(marks[x+','+y]?' mark':'');
      d.textContent=marks[x+','+y]||'';
      d.onclick=function(){
        if(x===4&&y===3){solvePuzzle();}
        else{fb('…아무 일도 일어나지 않는다.',false);shakePuz();}
      };
      tg.appendChild(d);
    })(x,y);
  }
  else if(s.kind==='scale'){
    weightZone={};
    var ws=[['재능',3],['운',2],['스펙',4],['시도',1],['실패',1],['버티기',1]];
    var wp=$('wp');
    ws.forEach(function(w){
      weightZone[w[0]]=0;
      var c=document.createElement('button');
      c.className='wchip'; c.textContent=w[0]+' '+w[1]+'kg';
      c.onclick=function(){
        weightZone[w[0]]=(weightZone[w[0]]+1)%3;
        c.className='wchip'+(weightZone[w[0]]===1?' L':weightZone[w[0]]===2?' R':'');
        c.textContent=w[0]+' '+w[1]+'kg'+(weightZone[w[0]]===1?' ◀':weightZone[w[0]]===2?' ▶':'');
        var L=0,R=0;
        ws.forEach(function(v){if(weightZone[v[0]]===1)L+=v[1];if(weightZone[v[0]]===2)R+=v[1];});
        $('sumL').textContent=L+'kg'; $('sumR').textContent=R+'kg';
      };
      wp.appendChild(c);
    });
  }
  else if(s.kind==='stars'){
    starNext=1; starLit=[];
    drawStars();
  }
  else if(s.kind==='seats'){
    seatMap={N:0,S:0,E:0,W:0};
  }
}

/* ── order ── */
function drawOrder(s){
  var og=$('og'); og.innerHTML='';
  ordItems.forEach(function(o){
    var b=document.createElement('button');
    var pos=ordSel.indexOf(o.i);
    b.className='ord-btn'+(pos>=0?' sel':'');
    b.innerHTML='<span class="ico">'+o.it.ico+'</span><span>'+esc(o.it.lbl)+'<span class="sub">'+esc(o.it.sub)+'</span></span>'+(pos>=0?'<span class="badge">'+(pos+1)+'</span>':'');
    b.onclick=function(){
      if(ordSel.indexOf(o.i)>=0)return;
      ordSel.push(o.i); drawOrder(s);
      if(ordSel.length===s.items.length){
        if(ordSel.join()===s.correct.join())solvePuzzle();
        else{fb('순서가 맞지 않는 것 같다…',false);shakePuz();setTimeout(function(){ordSel=[];drawOrder(s);},900);}
      }
    };
    og.appendChild(b);
  });
}
function orderReset(){ordSel=[];drawOrder(SCENES[idx]);fb('',true);}

/* ── stars ── */
var STARS=[
 {r:1,x:10,y:74},{r:2,x:23,y:62},{r:3,x:37,y:55},{r:4,x:51,y:47},
 {r:5,x:66,y:38},{r:6,x:83,y:45},{r:7,x:78,y:66},
 {r:0,x:16,y:26},{r:0,x:44,y:80},{r:0,x:60,y:70},{r:0,x:31,y:84},{r:0,x:90,y:18}
];
function drawStars(){
  var sb=$('sb');
  STARS.forEach(function(st,i){
    var d=document.createElement('div');
    d.className='star'+(st.r?'':' dim'); d.id='st'+i;
    d.style.left=st.x+'%'; d.style.top=st.y+'%';
    d.innerHTML='<span class="dot"></span>'+(st.r?'<span class="rk">★'+st.r+'</span>':'');
    d.onclick=function(){clickStar(st,i);};
    sb.appendChild(d);
  });
}
function clickStar(st,i){
  if(starNext>7)return;
  if(st.r===starNext){
    $('st'+i).classList.add('lit');
    starLit.push(st);
    if(starLit.length>1)starLine(starLit[starLit.length-2],st);
    starNext++;
    if(starNext>7){
      var a=STARS.filter(function(v){return v.r===4;})[0];
      starLine(st,a);
      fb('국자가 완성됐다.',true);
      $('starDone').innerHTML='<button class="btn btn-gold" onclick="solvePuzzle()">국자 끝이 가리키는 곳을 누른다</button>';
    }
  }else{
    fb('점이 어긋났다. 처음부터 다시…',false);
    starNext=1; starLit=[];
    STARS.forEach(function(v,j){var e=$('st'+j);if(e)e.classList.remove('lit');});
    $('starSvg').innerHTML='';
  }
}
function starLine(a,b){
  var l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',a.x+'%');l.setAttribute('y1',a.y+'%');
  l.setAttribute('x2',b.x+'%');l.setAttribute('y2',b.y+'%');
  $('starSvg').appendChild(l);
}

/* ── seats ── */
var SEAT_NAMES=['빈자리','엄마','준호','은사','나'];
function cycleSeat(k){
  seatMap[k]=(seatMap[k]+1)%5;
  var lbl={N:'북',S:'남',E:'동',W:'서'}[k];
  var el=$('s'+k);
  el.textContent=lbl+' · '+SEAT_NAMES[seatMap[k]];
  el.className='seat'+(seatMap[k]?' set':'');
}
function checkSeats(){
  if(SEAT_NAMES[seatMap.N]==='엄마'&&SEAT_NAMES[seatMap.S]==='은사'&&SEAT_NAMES[seatMap.E]==='준호'&&SEAT_NAMES[seatMap.W]==='나')solvePuzzle();
  else{fb('명패가 미묘하게 흔들린다. 아직 아니다.',false);shakePuz();}
}

/* ── scale ── */
function peekPan(){$('panSecret').style.display='block';}
function checkScale(){
  var world=['재능','운','스펙'], mine=['시도','실패','버티기'];
  var okL=world.every(function(w){return weightZone[w]===1;});
  var okR=mine.every(function(w){return weightZone[w]===2;});
  var allPlaced=Object.keys(weightZone).every(function(w){return weightZone[w]!==0;});
  if(okL&&okR)solvePuzzle();
  else if(allPlaced){fb('숫자가 맞는 것 같은데도 저울이 흔들린다. 명판을 다시 읽어 보자 — 세상의 것과, 나의 것.',false);shakePuz();}
  else{fb('저울이 한쪽으로 기울어 있다.',false);shakePuz();}
}

/* ── 체크 공통 ── */
function fb(msg,ok){var e=$('fb');if(!e)return;e.textContent=msg;e.className='feedback '+(ok?'ok':'no');}
function shakePuz(){var p=$('puz');p.classList.remove('shake');void p.offsetWidth;p.classList.add('shake');}
function checkCode(){
  var s=SCENES[idx],v='';
  for(var i=0;i<s.len;i++)v+=$('d'+i).value;
  if(v===s.ans)solvePuzzle();
  else{fb('맞지 않는다. 자물쇠는 침묵한다.',false);shakePuz();}
}
function checkText(){
  var s=SCENES[idx],v=norm($('ti').value);
  if(s.ans.indexOf(v)>=0)solvePuzzle();
  else{fb('아직 아닌 것 같다…',false);shakePuz();}
}
function checkFree(){
  var v=$('ti').value.trim();
  if(!v){fb('빈 마음은 전송되지 않습니다.',false);shakePuz();return;}
  solvePuzzle();
}
function pushDoor(){fb('문은 꿈쩍도 하지 않는다.',false);shakePuz();}
function pullDoor(){
  var v=$('ti').value.trim();
  if(!v){fb('먼저, 거울 속의 사람에게 한마디를 남겨 줘.',false);shakePuz();return;}
  myWords=v; solved++;
  showEnding();
}

/* ── 시간 초과: 탈출 실패 ── */
function showFail(){
  if(gameOver)return;
  gameOver=true;
  clearInterval(tmr);
  document.body.className='';
  ambTint(1);
  $('tbCh').textContent='TIME OVER';
  $('tbTtl').textContent='아직, 새벽 전';
  $('tbTimer').textContent='00:00';
  $('tbTimer').className='tb-timer low';
  var h='<div class="chap">';
  h+='<div class="scene-icon" style="border:none;background:transparent;height:auto;font-size:3.4rem;margin-bottom:18px;">🕯️</div>';
  h+='<h2>탈출 실패</h2>';
  h+='<p class="d">시계가 다시 4시 44분을 가리킨다.<br>이번 새벽에는 문에 닿지 못했다.<br><br>'
   +'하지만 이 방은 알고 있다 —<br>너는 여기까지 <b style="color:#ffc46b">'+solved+'개의 문제</b>를 스스로 풀며 왔다.<br><br>'
   +'해는 내일도 뜬다.<br>그리고 문은, 여전히 그 자리에 있다.</p>';
  h+='<button class="btn btn-gold" onclick="location.reload()">다시 도전한다</button>';
  h+='</div>';
  $('stage').innerHTML=h;
  window.scrollTo(0,0);
}

/* ── 정답 처리 ── */
function solvePuzzle(){
  var s=SCENES[idx];
  solved++;
  $('prog').style.width=(solved/20*100)+'%';
  var h='<div class="scene-icon" style="border-color:#2a4a3a">'+s.icon+'</div>';
  h+='<div class="puz correct"><div class="puz-no">PUZZLE '+String(s.no).padStart(2,'0')+' — 해결</div>';
  (s.after||[]).forEach(function(p){h+='<p class="stx" style="text-align:center">'+p+'</p>';});
  h+='</div><button class="btn btn-main" onclick="next()">계속</button>';
  var st=$('stage');
  st.classList.remove('fade');void st.offsetWidth;
  st.innerHTML=h;st.classList.add('fade');
  window.scrollTo(0,0);
}

/* ── 힌트 & 단서 ── */
function openHint(){
  var s=SCENES[idx];
  $('hintTtl').textContent='🕯️ 힌트 — '+s.ttl;
  drawHints(s);
  $('hintModal').classList.add('on');
}
function drawHints(s){
  var b=$('hintBody'),h='';
  for(var i=0;i<s._h;i++)h+='<div class="hint-item">힌트 '+(i+1)+'. '+s.hints[i]+'</div>';
  if(s._h<3)h+='<button class="hint-lock" onclick="revealHint()">🔒 힌트 '+(s._h+1)+' 열기</button>';
  b.innerHTML=h;
}
function revealHint(){
  var s=SCENES[idx];
  if(s._h<3){s._h++;hintsUsed++;drawHints(s);}
}
function closeHint(){$('hintModal').classList.remove('on');}
function showLetters(){
  $('hintTtl').textContent='📜 모은 단서';
  var h='';
  if(letters.length===0)h='<div class="hint-item">아직 모은 단서가 없다.</div>';
  else{
    h='<div style="display:flex;gap:9px;justify-content:center;margin-bottom:12px">';
    letters.forEach(function(L){h+='<div class="door-letter" style="width:52px;height:52px;font-size:1.4rem;border-radius:12px;animation:none">'+L+'</div>';});
    h+='</div><div class="hint-item" style="text-align:center">문틀에서 발견한 글자들 — 지나온 순서대로.</div>';
  }
  $('hintBody').innerHTML=h;
  $('hintModal').classList.add('on');
}

/* ── 엔딩 ── */
function showEnding(){
  gameOver=true;
  clearInterval(tmr);
  document.body.className='end';
  ambTint(5);
  $('tbCh').textContent='EPILOGUE';
  $('tbTtl').textContent='새벽';
  $('prog').style.width='100%';
  var h='<div class="end-wrap">';
  h+='<div class="sun">🌅</div>';
  h+='<p class="end-nar">문이 당겨져 열리고, 눈부신 새벽빛이 쏟아진다.<br><br>'
   +'문은 처음부터 열려 있었다.<br>나는 계속 <em>밀고만</em> 있었을 뿐.<br>'
   +'안 열린다고 믿었던 건, 문이 아니라 나였다.<br><br>'
   +'4시 44분. 가장 어두운 시간.<br>하지만 이제 나는 안다.<br>'
   +'이 시간의 다른 이름은 —<br><em>해 뜨기 2시간 32분 전.</em></p>';
  h+='<div class="mycard"><div class="cap">거울 속의 나에게 남긴 한마디</div><div class="words">“'+esc(myWords)+'”</div></div>';
  h+='<div class="end-stats">⏱ 탈출 시간 '+elapsed()+' (남은 시간 '+remainStr()+') · 🕯️ 힌트 '+hintsUsed+'회<br>다시 일어난 당신, 탈출 성공을 축하합니다.</div>';
  h+='<button class="btn btn-gold" onclick="copyCard()">📋 엔딩 카드 복사하기</button>';
  h+='<button class="btn btn-ghost" onclick="location.reload()">처음부터 다시</button>';
  h+='</div>';
  $('stage').innerHTML=h;
  window.scrollTo(0,0);
}
function copyCard(){
  var txt='🌅 「새벽 4시 44분」 탈출 성공!\n⏱ '+elapsed()+' · 힌트 '+hintsUsed+'회\n\n거울 속 나에게: "'+myWords+'"\n\n#새벽4시44분 #방탈출 #다시일어나';
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){alert('엔딩 카드가 복사되었습니다!');});
  else alert(txt);
}
</script>
</body>
</html>
